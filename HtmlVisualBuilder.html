<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visual Builder</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pako@2.1.0/dist/pako.min.js"></script>
    <script src="https://cdn.rawgit.com/htmlhint/HTMLHint/master/dist/htmlhint.js"></script>
    <style>
        /* CSS is unchanged */
        :root{--bg-color:#1e1e1e;--panel-bg:#252526;--toolbar-bg:#333333;--border-color:#444444;--text-color:#cccccc;--text-muted:#888888;--primary-color:#0d6efd;--danger-color:#dc3545;--input-bg:#3c3c3c;--success-color:#198754;--info-color:#0dcaf0}body.light-mode{--bg-color:#f8f9fa;--panel-bg:#ffffff;--toolbar-bg:#e9ecef;--border-color:#dee2e6;--text-color:#212529;--text-muted:#6c757d;--input-bg:#f1f3f5}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;margin:0;padding:0;background-color:var(--bg-color);color:var(--text-color);display:flex;flex-direction:column;height:100vh;overflow:hidden;transition:background-color .3s,color .3s}.toolbar{background-color:var(--toolbar-bg);border-bottom:1px solid var(--border-color);padding:10px 15px;display:flex;flex-wrap:wrap;align-items:center;gap:10px;flex-shrink:0}.toolbar .logo{font-weight:bold;font-size:1.2em;color:var(--text-color)}.toolbar button{background-color:var(--input-bg);color:var(--text-color);border:1px solid var(--border-color);padding:8px 12px;border-radius:4px;cursor:pointer;transition:background-color .2s}body.light-mode .toolbar button:hover{background-color:#ced4da}.toolbar button:hover{background-color:#555;color:white}.toolbar button i{margin-left:5px}.main-container{display:flex;flex-grow:1;overflow:hidden}.components-panel,.properties-panel,.settings-panel{flex:0 0 260px;background-color:var(--panel-bg);padding:15px;overflow-y:auto;border-left:1px solid var(--border-color);transition:background-color .3s,border-color .3s}.properties-panel{border-right:1px solid var(--border-color);border-left:none}.settings-panel{border-right:1px solid var(--border-color);border-left:none}.panel-header-main{margin-top:0;border-bottom:2px solid var(--primary-color);padding-bottom:10px;font-size:1.1em;color:var(--text-color)}.preview-container{flex:1;display:flex;flex-direction:column;min-width:0}.panel-header{background-color:var(--toolbar-bg);padding:8px 12px;font-weight:600;border-bottom:1px solid var(--border-color);transition:background-color .3s}.live-preview{width:100%;height:100%;border:none;background-color:white}.component-btn{display:block;width:100%;padding:12px;margin-bottom:10px;background-color:var(--input-bg);color:var(--text-color);border:1px solid var(--border-color);border-radius:4px;cursor:pointer;text-align:right;font-size:1em}h4{color:var(--primary-color);border-bottom:1px solid var(--border-color);padding-bottom:5px;margin-top:20px}#basic-components h4:first-child{margin-top:0}.form-group{margin-bottom:15px}.form-group label{display:block;margin-bottom:5px;font-weight:500}.form-group input,.form-group textarea,.form-group select{width:100%;padding:8px;border:1px solid var(--border-color);border-radius:4px;box-sizing:border-box;background-color:var(--input-bg);color:var(--text-color)}.form-check{display:flex;align-items:center;margin-bottom:8px}.form-check input{margin-left:10px}.delete-btn{width:100%;padding:10px;margin-top:20px;color:white;border:none;border-radius:4px;cursor:pointer;font-weight:bold;background-color:var(--danger-color)}.modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background-color:rgba(0,0,0,.7);display:none;justify-content:center;align-items:center;z-index:1000}.modal-overlay.full-screen .modal-content{width:95vw;max-width:95vw;height:90vh}.modal-content{background:var(--panel-bg);padding:20px;border-radius:5px;width:70%;max-width:900px;height:80vh;border:1px solid var(--border-color);display:flex;flex-direction:column;transition:width .3s,height .3s}.modal-header{display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border-color);padding-bottom:10px}.modal-close{font-size:1.5rem;cursor:pointer}.modal-body{flex-grow:1;overflow-y:auto;margin-top:15px;display:flex;flex-direction:column}.modal-body pre{background-color:var(--bg-color);color:var(--text-color);padding:15px;border-radius:4px;direction:ltr;text-align:left;white-space:pre-wrap;word-wrap:break-word;}.modal-body textarea{flex-grow:1;width:100%;background-color:var(--bg-color);color:var(--text-color);border:1px solid var(--border-color);border-radius:4px;padding:10px;font-family:monospace;direction:ltr;text-align:left;font-size:14px}.modal-footer{margin-top:15px;text-align:left}.validation-results ul{list-style-type:none;padding:0;font-family:monospace;direction:ltr}.validation-results li{padding:8px;border-radius:3px;margin-bottom:5px}.validation-results .error{background-color:#dc354520;border-left:3px solid var(--danger-color)}.validation-results .warning{background-color:#ffc10720;border-left:3px solid #ffc107}.validation-results .success{background-color:#19875420;border-left:3px solid var(--success-color);color:var(--success-color)}
        .settings-btn{width:100%;margin-bottom:10px}
        #modal-content-area{display:flex;flex-direction:column;flex-grow:1}
    </style>
</head>
<body>
    <div class="toolbar">
        <div class="logo">Visual Builder v11</div>
        <div style="flex-grow: 1;"></div>
        <button id="clear-canvas-btn" title="مسح كل المكونات"><i class="fas fa-trash"></i> مسح الكل</button>
        <span style="border-left: 1px solid var(--border-color); margin: 0 5px;"></span>
        <button id="save-btn"><i class="fas fa-save"></i> حفظ</button>
        <button id="load-btn"><i class="fas fa-folder-open"></i> تحميل</button>
        <input type="file" id="file-input" accept=".json" style="display: none;">
        <span style="border-left: 1px solid var(--border-color); margin: 0 5px;"></span>
        <button id="manual-edit-btn" title="تحذير: هذا سيحول المشروع إلى وضع الكود فقط"><i class="fas fa-edit"></i> تعديل يدوي</button>
        <button id="theme-toggle-btn" title="الوضع الفاتح"><i class="fas fa-sun"></i></button>
        <button id="validate-code-btn" title="فحص الكود"><i class="fas fa-check-circle"></i></button>
        <button id="share-code-btn" title="مشاركة"><i class="fas fa-share-alt"></i></button>
        <button id="export-html-btn" title="تصدير HTML"><i class="fas fa-file-download"></i></button>
        <button id="view-code-btn" title="عرض الكود"><i class="fas fa-eye"></i></button>
    </div>
    
    <div class="main-container"></div>
    <div id="code-modal" class="modal-overlay"></div>

    <script>
        (function() {
            // Setup the main HTML structure
            document.querySelector('.main-container').innerHTML = `
                <div class="settings-panel"><h3 class="panel-header-main"><i class="fas fa-cog"></i>إعدادات</h3><div id="settings-content"><div class="settings-group"><h4>أطر عمل CSS</h4><div class="form-check"><input type="checkbox" id="bootstrap-checkbox"><label for="bootstrap-checkbox">Bootstrap 5</label></div><div class="form-check"><input type="checkbox" id="tailwind-checkbox"><label for="tailwind-checkbox">Tailwind CSS</label></div><div class="form-check"><input type="checkbox" id="bulma-checkbox"><label for="bulma-checkbox">Bulma</label></div><div class="form-check"><input type="checkbox" id="foundation-checkbox"><label for="foundation-checkbox">Foundation</label></div><div class="form-check"><input type="checkbox" id="semantic-checkbox"><label for="semantic-checkbox">Semantic UI</label></div></div><div class="settings-group"><h4>كود مخصص</h4><button id="edit-css-btn" class="component-btn settings-btn"><i class="fab fa-css3-alt"></i>تعديل CSS</button><button id="edit-js-btn" class="component-btn settings-btn"><i class="fab fa-js"></i>تعديل JavaScript</button></div></div></div>
                <div class="properties-panel" id="properties-panel"><h3 class="panel-header-main"><i class="fas fa-sliders-h"></i>الخصائص</h3><div id="properties-content"><p style="color: var(--text-muted);">حدد مكونًا للتعديل.</p></div></div>
                <div class="preview-container"><div class="panel-header">مساحة العمل (Canvas)</div><iframe id="live-preview" class="live-preview"></iframe></div>
                <div class="components-panel"><h3 class="panel-header-main"><i class="fas fa-cubes"></i>المكونات</h3><div id="basic-components"><h4>أساسية</h4></div><div id="html-components"><h4>عناصر HTML</h4></div><div id="bootstrap-components" style="display:none;"><h4>Bootstrap</h4></div><div id="tailwind-components" style="display:none;"><h4>Tailwind CSS</h4></div><div id="bulma-components" style="display:none;"><h4>Bulma</h4></div><div id="foundation-components" style="display:none;"><h4>Foundation</h4></div><div id="semantic-components" style="display:none;"><h4>Semantic UI</h4></div><div id="custom-code-components"><h4>مخصص</h4></div></div>`;
            document.getElementById('code-modal').innerHTML = `
                <div class="modal-content"><div class="modal-header"><h3 id="modal-title">الكود</h3><span id="modal-close-btn" class="modal-close">&times;</span></div><div class="modal-body"><div id="modal-content-area"></div></div><div class="modal-footer" id="modal-footer" style="display: none;"><button id="modal-save-btn" class="save-btn" style="background-color: var(--primary-color); color: white; padding: 8px 16px;">حفظ</button></div></div>`;

            // --- Constants and State ---
            const LOCAL_STORAGE_KEY = 'visualBuilderProject_v11';
            const THEME_KEY = 'visualBuilderTheme';
            let projectSettings = { libraries: new Set(), customCSS: '', customJS: '' };
            let pageComponents = []; let selectedComponentId = null;
            const libraries = {bootstrap:{css:'https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css',js:'https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js'},tailwind:{js:'https://cdn.tailwindcss.com'},bulma:{css:'https://cdn.jsdelivr.net/npm/bulma@1.0.1/css/bulma.min.css'},foundation:{css:'https://cdn.jsdelivr.net/npm/foundation-sites@6.8.1/dist/css/foundation.min.css',js:'https://cdn.jsdelivr.net/npm/foundation-sites@6.8.1/dist/js/foundation.min.js'},semantic:{css:'https://cdn.jsdelivr.net/npm/semantic-ui@2.5.0/dist/semantic.min.css',js:'https://cdn.jsdelivr.net/npm/semantic-ui@2.5.0/dist/semantic.min.js',deps:['https://code.jquery.com/jquery-3.7.1.min.js']}};
            const commonDefaultPropsWrapper = { textAlign: '', textColor: '', customClasses: '' };
            
            // [FIXED] Restored direct style application in component render functions
            function applyStyles(props) { let s=''; if(props.textAlign)s+=`text-align:${props.textAlign};`; if(props.textColor)s+=`color:${props.textColor};`; return s; }
            const componentRegistry = {
                'Headline':{defaultProps:{...commonDefaultPropsWrapper, text:'عنوان رئيسي'},render:(p)=>`<h1 style="${applyStyles(p)}">${p.text}</h1>`,getProperties:(p)=>`<div class="form-group"><label>النص</label><input type="text" data-prop="text" value="${p.text}"></div>`},
                'Paragraph':{defaultProps:{...commonDefaultPropsWrapper, text:'نص فقرة.'},render:(p)=>`<p style="${applyStyles(p)}">${p.text}</p>`,getProperties:(p)=>`<div class="form-group"><label>النص</label><textarea data-prop="text" rows="5">${p.text}</textarea></div>`},
                'Image': {defaultProps:{...commonDefaultPropsWrapper, src:'https://via.placeholder.com/400x200',alt:'Sample Image',width:''},render:(p)=>`<img src="${p.src}" alt="${p.alt}" style="width:${p.width?p.width+'%':'auto'};max-width:100%;${applyStyles(p)}">`,getProperties:(p)=>`<div class="form-group"><label>رابط الصورة</label><input type="text" data-prop="src" value="${p.src}"></div><div class="form-group"><label>النص البديل</label><input type="text" data-prop="alt" value="${p.alt}"></div><div class="form-group"><label>العرض (%)</label><input type="number" data-prop="width" value="${p.width}" min="1" max="100"></div>`},
                'DivBlock': {defaultProps:{...commonDefaultPropsWrapper},render:(p)=>`<div style="padding:20px;border:1px dashed #ccc;${applyStyles(p)}">كتلة Div</div>`,getProperties:()=>`<p>استخدم الخيارات العامة لتخصيص هذا العنصر.</p>`},
                'Link': {defaultProps:{...commonDefaultPropsWrapper, text:'رابط تشعبي',href:'#'},render:(p)=>`<a href="${p.href}" style="${applyStyles(p)}">${p.text}</a>`,getProperties:(p)=>`<div class="form-group"><label>النص</label><input type="text" data-prop="text" value="${p.text}"></div><div class="form-group"><label>الرابط (URL)</label><input type="text" data-prop="href" value="${p.href}"></div>`},
                'UnorderedList': {defaultProps:{...commonDefaultPropsWrapper, items:'<li>عنصر ١</li>\n<li>عنصر ٢</li>'},render:(p)=>`<ul style="${applyStyles(p)}">${p.items}</ul>`,getProperties:(p)=>`<div class="form-group"><label>عناصر القائمة (HTML)</label><textarea data-prop="items" rows="5" style="direction:ltr;text-align:left;">${p.items}</textarea></div>`},
                'Table': {defaultProps:{...commonDefaultPropsWrapper, html:`<thead>\n  <tr><th>#</th><th>الاسم</th></tr>\n</thead>\n<tbody>\n  <tr><td>1</td><td>أحمد</td></tr>\n</tbody>`},render:(p)=>`<table class="table" style="${applyStyles(p)}">${p.html}</table>`,getProperties:(p)=>`<div class="form-group"><label>محتوى الجدول (HTML)</label><textarea data-prop="html" rows="8" style="direction:ltr;text-align:left;">${p.html}</textarea></div>`},
                'HorizontalRule':{defaultProps:{},render:()=>`<hr>`,getProperties:()=>`<p>لا توجد خصائص لهذا المكون.</p>`},
                'BootstrapButton':{defaultProps:{...commonDefaultPropsWrapper,text:'زر Bootstrap',style:'btn-primary'},render:(p)=>`<button type="button" class="btn ${p.style}">${p.text}</button>`,getProperties:(p)=>`<div class="form-group"><label>النص</label><input type="text" data-prop="text" value="${p.text}"></div><div class="form-group"><label>النمط</label><select data-prop="style">${['btn-primary','btn-secondary','btn-success','btn-danger'].map(s=>`<option value="${s}" ${p.style===s?'selected':''}>${s}</option>`).join('')}</select></div>`},
                'BootstrapCard':{defaultProps:{...commonDefaultPropsWrapper,title:'عنوان البطاقة',content:'نص البطاقة هنا.'},render:(p)=>`<div class="card" style="width:18rem;${applyStyles(p)}"><div class="card-body"><h5 class="card-title">${p.title}</h5><p class="card-text">${p.content}</p></div></div>`,getProperties:(p)=>`<div class="form-group"><label>العنوان</label><input type="text" data-prop="title" value="${p.title}"></div><div class="form-group"><label>المحتوى</label><textarea data-prop="content" rows="4">${p.content}</textarea></div>`},
                'TailwindCard':{defaultProps:{...commonDefaultPropsWrapper,title:'Tailwind Card',content:'Utility classes make it easy.'},render:(p)=>`<div class="max-w-sm rounded overflow-hidden shadow-lg bg-white text-gray-800 p-6" style="${applyStyles(p)}"><div class="font-bold text-xl mb-2">${p.title}</div><p class="text-gray-700 text-base">${p.content}</p></div>`,getProperties:(p)=>`<div class="form-group"><label>العنوان</label><input type="text" data-prop="title" value="${p.title}"></div><div class="form-group"><label>المحتوى</label><textarea data-prop="content" rows="4">${p.content}</textarea></div>`},
                'BulmaButton':{defaultProps:{...commonDefaultPropsWrapper,text:'زر Bulma',style:'is-primary'},render:(p)=>`<button class="button ${p.style}">${p.text}</button>`,getProperties:(p)=>`<div class="form-group"><label>النص</label><input type="text" data-prop="text" value="${p.text}"></div><div class="form-group"><label>النمط</label><select data-prop="style">${['is-primary','is-link','is-info','is-success','is-warning','is-danger'].map(s=>`<option value="${s}" ${p.style===s?'selected':''}>${s}</option>`).join('')}</select></div>`},
                'BulmaMessage':{defaultProps:{...commonDefaultPropsWrapper,title:'Hello Bulma',content:'This is a message.'},render:(p)=>`<article class="message is-info" style="${applyStyles(p)}"><div class="message-header"><p>${p.title}</p></div><div class="message-body">${p.content}</div></article>`,getProperties:(p)=>`<div class="form-group"><label>العنوان</label><input type="text" data-prop="title" value="${p.title}"></div><div class="form-group"><label>المحتوى</label><textarea data-prop="content" rows="4">${p.content}</textarea></div>`},
                'FoundationButton':{defaultProps:{...commonDefaultPropsWrapper,text:'زر Foundation',style:'primary'},render:(p)=>`<button type="button" class="button ${p.style}">${p.text}</button>`,getProperties:(p)=>`<div class="form-group"><label>النص</label><input type="text" data-prop="text" value="${p.text}"></div><div class="form-group"><label>النمط</label><select data-prop="style">${['primary','secondary','success','alert','warning'].map(s=>`<option value="${s}" ${p.style===s?'selected':''}>${s}</option>`).join('')}</select></div>`},
                'FoundationCallout':{defaultProps:{...commonDefaultPropsWrapper,content:'This is a callout.'},render:(p)=>`<div class="callout primary" style="${applyStyles(p)}">${p.content}</div>`,getProperties:(p)=>`<div class="form-group"><label>المحتوى</label><textarea data-prop="content" rows="4">${p.content}</textarea></div>`},
                'SemanticButton':{defaultProps:{...commonDefaultPropsWrapper,text:'زر Semantic',style:'primary'},render:(p)=>`<button class="ui button ${p.style}">${p.text}</button>`,getProperties:(p)=>`<div class="form-group"><label>النص</label><input type="text" data-prop="text" value="${p.text}"></div><div class="form-group"><label>النمط</label><select data-prop="style">${['primary','secondary','positive','negative'].map(s=>`<option value="${s}" ${p.style===s?'selected':''}>${s}</option>`).join('')}</select></div>`},
                'SemanticMessage':{defaultProps:{...commonDefaultPropsWrapper,content:'This is a message.'},render:(p)=>`<div class="ui message positive" style="${applyStyles(p)}"><div class="header">Message</div><p>${p.content}</p></div>`,getProperties:(p)=>`<div class="form-group"><label>المحتوى</label><textarea data-prop="content" rows="4">${p.content}</textarea></div>`},
                'CustomHTML':{defaultProps:{html:''},render:(p)=>p.html,getProperties:(p)=>`<div class="form-group"><label>كود HTML</label><textarea data-prop="html" rows="10" style="font-family:monospace;direction:ltr;text-align:left;">${p.html}</textarea></div>`}
            };

            // --- DOM Element Selection ---
            const dom = {};
            const allIds=["live-preview","properties-content","bootstrap-checkbox","bootstrap-components","tailwind-checkbox","tailwind-components","bulma-checkbox","bulma-components","foundation-checkbox","foundation-components","semantic-checkbox","semantic-components","code-modal","modal-close-btn","modal-title","modal-content-area","modal-footer","clear-canvas-btn","save-btn","load-btn","file-input","manual-edit-btn","theme-toggle-btn","validate-code-btn","share-code-btn","export-html-btn","view-code-btn","edit-css-btn","edit-js-btn"];
            allIds.forEach(id=>{dom[id.replace(/-(\w)/g,(m,p1)=>p1.toUpperCase())]=document.getElementById(id)});
            dom.componentSections={basic:document.getElementById('basic-components'),html:document.getElementById('html-components'),custom:document.getElementById('custom-code-components'),bootstrap:dom.bootstrapComponents,tailwind:dom.tailwindComponents,bulma:dom.bulmaComponents,foundation:dom.foundationComponents,semantic:dom.semanticComponents};
            dom.libraryCheckboxes={bootstrap:dom.bootstrapCheckbox,tailwind:dom.tailwindCheckbox,bulma:dom.bulmaCheckbox,foundation:dom.foundationCheckbox,semantic:dom.semanticCheckbox};

            // --- Core Functions ---
            const debounce=(f,d=300)=>{let t;return(...a)=>{clearTimeout(t);t=setTimeout(()=>f.apply(this,a),d)}};
            function renderAndSave(){renderCanvas();autoSaveToLocalStorage()}
            function closeModal(){dom.codeModal.style.display='none';dom.codeModal.classList.remove('full-screen')}
            function openInfoModal(title,contentHtml){dom.modalTitle.textContent=title;dom.modalContentArea.innerHTML=contentHtml;dom.modalFooter.style.display='none';dom.codeModal.classList.remove('full-screen');dom.codeModal.style.display='flex'}
            function openEditorModal({title,content,onSave,saveLabel='حفظ'}){dom.modalTitle.textContent=title;dom.modalContentArea.innerHTML=`<textarea id="editor-textarea">${content}</textarea>`;dom.modalFooter.style.display='block';dom.codeModal.classList.add('full-screen');let saveBtn=document.getElementById('modal-save-btn');let newSaveBtn=saveBtn.cloneNode(true);saveBtn.parentNode.replaceChild(newSaveBtn,saveBtn);newSaveBtn.textContent=saveLabel;newSaveBtn.onclick=()=>{const newContent=document.getElementById('editor-textarea').value;onSave(newContent);closeModal()};dom.codeModal.style.display='flex'}
            function getCommonProperties(props){return`<hr><h4>خيارات عامة</h4><div class="form-group"><label>لون النص</label><input type="color" data-prop="textColor" value="${props.textColor||''}"></div><div class="form-group"><label>المحاذاة</label><select data-prop="textAlign"><option value="" ${!props.textAlign?'selected':''}>افتراضي</option><option value="right" ${props.textAlign==='right'?'selected':''}>يمين</option><option value="center" ${props.textAlign==='center'?'selected':''}>وسط</option><option value="left" ${props.textAlign==='left'?'selected':''}>يسار</option></select></div><div class="form-group"><label>كلاس CSS إضافي</label><input type="text" data-prop="customClasses" value="${props.customClasses||''}" placeholder="e.g., my-class"></div>`}
            function generateFullPageCode(forExport=false){let h='',b='',f='';if(projectSettings.libraries.has('tailwind')){h+=`<script src="${libraries.tailwind.js}"><\/script>\n`}
            projectSettings.libraries.forEach(lib=>{const d=libraries[lib];if(d?.css)h+=`<link rel="stylesheet" href="${d.css}">\n`;if(d?.deps)d.deps.forEach(dep=>b+=`<script src="${dep}"><\/script>\n`);if(d?.js&&lib!=='tailwind')b+=`<script src="${d.js}"><\/script>\n`});
            if(projectSettings.customCSS)h+=`<style>\n${projectSettings.customCSS}\n<\/style>\n`;if(projectSettings.customJS)b+=`<script>\n${projectSettings.customJS}\n<\/script>\n`;
            pageComponents.forEach(c=>{const d=componentRegistry[c.type];if(!d)return;const e=d.render(c.props);const i=!forExport&&c.id===selectedComponentId;const w=`${i?'selected':''} ${c.props.customClasses||''}`.trim();f+=`<div data-id="${c.id}" class="${w}" title="تعديل الخصائص">${e}</div>\n`}); // [FIXED] Removed style attribute from wrapper div
            const s=forExport?'':`<style>body{padding:20px;font-family:sans-serif;}[data-id]{cursor:grab;position:relative;}.selected{outline:2px solid #0d6efd !important;outline-offset:1px;}.component-toolbar{position:absolute;top:-28px;right:0;z-index:10;background-color:#0d6efd;padding:4px;border-radius:4px;display:flex;gap:4px;}.component-toolbar button{background:none;border:none;color:white;cursor:pointer;font-size:14px;padding:2px 4px;}.component-toolbar button:hover{background-color:rgba(255,255,255,0.2);}</style>`;
            return`<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8">${h}${s}</head><body>${f}${b}</body></html>`}
            function getProjectData(){return{components:pageComponents,settings:{libraries:Array.from(projectSettings.libraries),customCSS:projectSettings.customCSS,customJS:projectSettings.customJS}}}
            function loadProjectData(d){pageComponents=d.components||[];projectSettings.libraries=new Set(d.settings?.libraries||[]);projectSettings.customCSS=d.settings?.customCSS||'';projectSettings.customJS=d.settings?.customJS||'';Object.keys(dom.libraryCheckboxes).forEach(key=>{const c=dom.libraryCheckboxes[key];const s=dom.componentSections[key];if(c){c.checked=projectSettings.libraries.has(key);if(s)s.style.display=c.checked?'block':'none'}});selectedComponentId=null}
            function autoSaveToLocalStorage(){localStorage.setItem(LOCAL_STORAGE_KEY,JSON.stringify(getProjectData()))}
            function renderCanvas(){dom.livePreview.srcdoc=generateFullPageCode(false);dom.livePreview.onload=()=>{addEventListenersToIframe();initializeSortable();addCanvasControls()}}
            function deleteComponent(id){const i=pageComponents.findIndex(c=>c.id===id);if(i>-1){pageComponents.splice(i,1);if(selectedComponentId===id)selectedComponentId=null;renderAndSave();renderPropertiesPanel()}}
            function renderPropertiesPanel(){if(!selectedComponentId){dom.propertiesContent.innerHTML='<p style="color:var(--text-muted);">حدد مكونًا للتعديل.</p>';return}const c=pageComponents.find(p=>p.id===selectedComponentId);if(!c)return;const d=componentRegistry[c.type];if(!d)return;let h=d.getProperties(c.props);h+=getCommonProperties(c.props);dom.propertiesContent.innerHTML=h;const del=document.createElement('button');del.textContent='حذف المكون';del.className='delete-btn';del.onclick=()=>deleteComponent(selectedComponentId);dom.propertiesContent.appendChild(del);addEventListenersToPanel(c)}
            function addEventListenersToPanel(c){const dR=debounce(()=>renderAndSave());dom.propertiesContent.querySelectorAll('[data-prop]').forEach(i=>{const e=(i.type==='text'||i.tagName==='TEXTAREA')?'input':'change';i.addEventListener(e,ev=>{c.props[ev.target.dataset.prop]=ev.target.value;e==='input'?dR():renderAndSave()})})}
            function addEventListenersToIframe(){const d=dom.livePreview.contentDocument;if(!d)return;d.querySelectorAll('[data-id]').forEach(e=>{e.addEventListener('click',ev=>{ev.stopPropagation();selectedComponentId=ev.currentTarget.dataset.id;renderCanvas();renderPropertiesPanel()})})}
            function addCanvasControls(){const d=dom.livePreview.contentDocument;if(!d)return;const s=d.querySelector('.selected');if(s){const t=document.createElement('div');t.className='component-toolbar';t.innerHTML=`<button class="toolbar-btn-delete" title="حذف"><i class="fas fa-trash"></i></button>`;s.appendChild(t);t.querySelector('.toolbar-btn-delete').addEventListener('click',e=>{e.stopPropagation();const id=s.dataset.id;deleteComponent(id)})}}
            function initializeSortable(){const b=dom.livePreview.contentDocument?.body;if(!b)return;new Sortable(b,{animation:150,onEnd:(e)=>{const[m]=pageComponents.splice(e.oldIndex,1);pageComponents.splice(e.newIndex,0,m);renderAndSave()}})}
            function createComponent(t){const d=componentRegistry[t];if(!d)return null;return{id:`comp-${Date.now()}`,type:t,props:{...d.defaultProps}}}
            function loadFromLocalStorage(){const s=localStorage.getItem(LOCAL_STORAGE_KEY);if(s){loadProjectData(JSON.parse(s))}}
            function loadFromUrl(){try{const h=window.location.hash;if(h.startsWith('#data=')){const p=JSON.parse(pako.inflate(atob(decodeURIComponent(h.substring(6))),{to:'string'}));loadProjectData(p);history.pushState("",document.title,window.location.pathname+window.location.search);return true}}catch(e){alert('فشل تحميل المشروع من الرابط.')}return false}
            function populateComponentPanel(section,types){let html=`<h4>${section.querySelector('h4').textContent}</h4>`;types.forEach(type=>{const def=componentRegistry[type];if(!def)return;const name=def.defaultProps.text||type.replace(/([A-Z])/g,' $1').trim();html+=`<button class="component-btn" data-type="${type}"><i class="fas fa-cube"></i> ${name}</button>`});section.innerHTML=html;section.querySelectorAll('.component-btn').forEach(b=>{b.addEventListener('click',()=>{const newComp=createComponent(b.dataset.type);if(newComp){pageComponents.push(newComp);selectedComponentId=newComp.id;renderAndSave();renderPropertiesPanel()}})})};
            function initializeComponentPanels(){populateComponentPanel(dom.componentSections.basic,['Headline','Paragraph','Image']);populateComponentPanel(dom.componentSections.html,['DivBlock','Link','UnorderedList','Table','HorizontalRule']);populateComponentPanel(dom.componentSections.custom,['CustomHTML']);populateComponentPanel(dom.componentSections.bootstrap,['BootstrapButton','BootstrapCard']);populateComponentPanel(dom.componentSections.tailwind,['TailwindCard']);populateComponentPanel(dom.componentSections.bulma,['BulmaButton','BulmaMessage']);populateComponentPanel(dom.componentSections.foundation,['FoundationButton','FoundationCallout']);populateComponentPanel(dom.componentSections.semantic,['SemanticButton','SemanticMessage'])};

            // --- Event Listeners Setup ---
            dom.modalCloseBtn.addEventListener('click',closeModal);dom.codeModal.addEventListener('click',(e)=>{if(e.target===dom.codeModal)closeModal()});
            dom.viewCodeBtn.addEventListener('click',()=>{openInfoModal('عرض الكود',`<pre><code>${generateFullPageCode(true).replace(/</g,"&lt;").replace(/>/g,"&gt;")}</code></pre>`)});
            dom.validateCodeBtn.addEventListener('click',()=>{const r=HTMLHint.verify(generateFullPageCode(true));let c='<div class="validation-results">';if(r.length===0){c+='<div class="success">تم فحص الكود. لا توجد أخطاء!</div>'}else{c+=`<ul>${r.map(i=>`<li class="${i.type}"><strong>[${i.type.toUpperCase()}]</strong> ${i.message}<br><small>Line ${i.line}, Col ${i.col}</small></li>`).join('')}</ul>`}c+='</div>';openInfoModal('نتائج فحص الكود',c)});
            dom.editCssBtn.addEventListener('click',()=>{openEditorModal({title:'تعديل CSS المخصص',content:projectSettings.customCSS,onSave:(newCode)=>{projectSettings.customCSS=newCode;renderAndSave()}})});
            dom.editJsBtn.addEventListener('click',()=>{openEditorModal({title:'تعديل JavaScript المخصص',content:projectSettings.customJS,onSave:(newCode)=>{projectSettings.customJS=newCode;renderAndSave()}})});
            dom.manualEditBtn.addEventListener('click',()=>{openEditorModal({title:'التعديل اليدوي للكود',content:generateFullPageCode(true),saveLabel:'حفظ واستبدال',onSave:(newCode)=>{if(confirm("تحذير: هل تريد المتابعة؟")){pageComponents=[{id:`comp-${Date.now()}`,type:'CustomHTML',props:{html:newCode}}];selectedComponentId=null;renderAndSave();renderPropertiesPanel()}}})});
            dom.clearCanvasBtn.addEventListener('click',()=>{if(confirm('هل أنت متأكد من أنك تريد مسح كل المكونات؟')){pageComponents=[];selectedComponentId=null;renderAndSave();renderPropertiesPanel()}});
            dom.themeToggleBtn.addEventListener('click',()=>{document.body.classList.toggle('light-mode');const i=document.body.classList.contains('light-mode');localStorage.setItem(THEME_KEY,i?'light':'dark');dom.themeToggleBtn.innerHTML=i?'<i class="fas fa-moon"></i>':'<i class="fas fa-sun"></i>';dom.themeToggleBtn.title=i?'الوضع المظلم':'الوضع الفاتح'});
            Object.keys(dom.libraryCheckboxes).forEach(key=>{const c=dom.libraryCheckboxes[key];if(c){c.addEventListener('change',e=>{if(e.target.checked){projectSettings.libraries.add(key)}else{projectSettings.libraries.delete(key)}dom.componentSections[key].style.display=e.target.checked?'block':'none';renderAndSave()})}});
            dom.exportHtmlBtn.addEventListener('click',()=>{let f=prompt("أدخل اسم الملف (بدون .html):","index");if(!f){return}f=f.replace(/[^a-z0-9]/gi,'_').toLowerCase();const h=generateFullPageCode(true);const b=new Blob([h],{type:'text/html'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=`${f}.html`;a.click();URL.revokeObjectURL(a.href)});
            dom.saveBtn.addEventListener('click',()=>{let f=prompt("أدخل اسم ملف المشروع (بدون .json):","project");if(!f)return;f=f.replace(/[^a-z0-9]/gi,'_').toLowerCase();const b=new Blob([JSON.stringify(getProjectData(),null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=`${f}.json`;a.click();URL.revokeObjectURL(a.href)});
            dom.loadBtn.addEventListener('click',()=>dom.fileInput.click());
            dom.fileInput.addEventListener('change',(e)=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=(ev)=>{try{const p=JSON.parse(ev.target.result);loadProjectData(p);renderAndSave();renderPropertiesPanel()}catch(err){alert('خطأ في تحميل الملف.')}};r.readAsText(f);e.target.value=null});
            dom.shareCodeBtn.addEventListener('click',async()=>{try{const u=`${window.location.origin}${window.location.pathname}#data=${encodeURIComponent(btoa(pako.deflate(JSON.stringify(getProjectData()),{to:'string'})))}`;await navigator.clipboard.writeText(u);alert('تم نسخ رابط المشاركة إلى الحافظة!')}catch(err){alert('فشل إنشاء رابط المشاركة.')}});
            
            // --- Initialization ---
            function initializeApp() {
                initializeComponentPanels();
                const savedTheme = localStorage.getItem(THEME_KEY);
                if (savedTheme === 'light') { document.body.classList.add('light-mode'); dom.themeToggleBtn.innerHTML = '<i class="fas fa-moon"></i>'; dom.themeToggleBtn.title = 'الوضع المظلم'; }
                if (!loadFromUrl()) { loadFromLocalStorage(); }
                if (pageComponents.length === 0) { pageComponents.push(createComponent('Headline')); }
                renderCanvas();
                renderPropertiesPanel();
            }
            initializeApp();
        })();
    </script>
</body>
</html>
