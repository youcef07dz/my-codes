<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Space Impact</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Chakra+Petch:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#02020a;display:flex;justify-content:center;align-items:center;height:100vh;overflow:hidden;user-select:none;-webkit-user-select:none}
canvas{display:block;box-shadow:0 0 60px rgba(0,255,136,0.04),0 0 120px rgba(0,0,0,0.9);cursor:crosshair}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const C=document.getElementById('c'),X=C.getContext('2d');
const GW=480,GH=300;C.width=GW;C.height=GH;

function resize(){const r=GW/GH;let w=window.innerWidth*0.92,h=window.innerHeight*0.88;if(w/h>r)w=h*r;else h=w/r;C.style.width=Math.floor(w)+'px';C.style.height=Math.floor(h)+'px'}
resize();window.addEventListener('resize',resize);

// ===== FONTS =====
const F_PIXEL='"Press Start 2P"';
const F_UI='"Chakra Petch"';

let sharpness=1;
const sharpCSS=['auto','auto','pixelated'];
const sharpSmooth=['true','true','false'];
const sharpLabels=['SOFT','NORMAL','SHARP'];

function applySharpness(){
  C.style.imageRendering=sharpCSS[sharpness];
  X.imageSmoothingEnabled=sharpSmooth[sharpness]==='true';
}

// ===== THEMES =====
const themes={
  high:{name:'HIGH GFX',key:'high',bg:'#050510',panelBg:'rgba(0,10,6,0.8)',panelBorder:'rgba(0,255,136,0.18)',panelCorner:'rgba(0,255,136,0.3)',scanlines:true,vignette:true,nebulae:true,glows:true,particles:true,starCount:120,coloredStars:15,pBulletGlow:'rgba(0,255,170,0.18)',eBulletGlow:'rgba(255,68,102,0.2)',puGlow:0.25,shipGlow:0.04,explodeCount:40,explodeSmall:18,hudScore:'#00ffaa',hudLabel:'#445544',hudAccent:'#ffaa00',hudWpn:'#44aaff',menuTitle1:'#00ffaa',menuTitle2:'#ff6622',menuSub:'#2a3a2a',menuCtrl:'#3a4a3a',goTitle:'#ff2200',goScore:'#00ffaa',warnColor:'#ff2200',warnSub:'#ff6644',warnFlash:'rgba(255,0,0,0.08)',canvasBorder:'#0a1a12',canvasShadow:'rgba(0,255,136,0.04)',isNokia:false},
  min:{name:'MINIMUM',key:'min',bg:'#0a0a12',panelBg:'rgba(15,15,25,0.85)',panelBorder:'rgba(80,80,120,0.2)',panelCorner:'rgba(80,80,120,0.3)',scanlines:false,vignette:false,nebulae:false,glows:false,particles:true,starCount:50,coloredStars:0,pBulletGlow:'rgba(0,0,0,0)',eBulletGlow:'rgba(0,0,0,0)',puGlow:0,shipGlow:0,explodeCount:20,explodeSmall:8,hudScore:'#ccccee',hudLabel:'#555566',hudAccent:'#aaaa44',hudWpn:'#6688cc',menuTitle1:'#ccccee',menuTitle2:'#cc8844',menuSub:'#333344',menuCtrl:'#444455',goTitle:'#cc2222',goScore:'#ccccee',warnColor:'#cc2222',warnSub:'#cc6644',warnFlash:'rgba(200,0,0,0.06)',canvasBorder:'#1a1a28',canvasShadow:'rgba(0,0,0,0.8)',isNokia:false},
  nokia:{name:'NOKIA 3310',key:'nokia',bg:'#c8c8b4',panelBg:'rgba(0,0,0,0.82)',panelBorder:'rgba(0,0,0,0.6)',panelCorner:'rgba(0,0,0,0.7)',scanlines:false,vignette:false,nebulae:false,glows:false,particles:false,starCount:0,coloredStars:0,pBulletGlow:'rgba(0,0,0,0)',eBulletGlow:'rgba(0,0,0,0)',puGlow:0,shipGlow:0,explodeCount:0,explodeSmall:0,hudScore:'#ffffff',hudLabel:'#999999',hudAccent:'#ffffff',hudWpn:'#ffffff',menuTitle1:'#000000',menuTitle2:'#000000',menuSub:'#555555',menuCtrl:'#333333',goTitle:'#000000',goScore:'#000000',warnColor:'#000000',warnSub:'#333333',warnFlash:'rgba(0,0,0,0.05)',canvasBorder:'#222222',canvasShadow:'rgba(0,0,0,0.5)',isNokia:true}
};

let currentTheme='high';
function T(){return themes[currentTheme]}
function applyThemeCSS(){const t=T();C.style.borderColor=t.canvasBorder;C.style.boxShadow=`0 0 60px ${t.canvasShadow}, 0 0 120px rgba(0,0,0,0.9)`;document.body.style.background=t.isNokia?'#888880':'#02020a';applySharpness()}

// ===== AUDIO =====
let audioCtx,soundOn=true;
function initAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)()}
function sfx(t){if(!audioCtx||!soundOn)return;const tm=audioCtx.currentTime,o=audioCtx.createOscillator(),g=audioCtx.createGain();o.connect(g);g.connect(audioCtx.destination);
switch(t){case'shoot':o.type='square';o.frequency.setValueAtTime(1100,tm);o.frequency.exponentialRampToValueAtTime(300,tm+0.04);g.gain.setValueAtTime(0.05,tm);g.gain.exponentialRampToValueAtTime(0.001,tm+0.04);o.start(tm);o.stop(tm+0.04);break;case'hit':o.type='square';o.frequency.setValueAtTime(220,tm);o.frequency.exponentialRampToValueAtTime(55,tm+0.08);g.gain.setValueAtTime(0.07,tm);g.gain.exponentialRampToValueAtTime(0.001,tm+0.08);o.start(tm);o.stop(tm+0.08);break;case'explode':o.type='sawtooth';o.frequency.setValueAtTime(150,tm);o.frequency.exponentialRampToValueAtTime(15,tm+0.3);g.gain.setValueAtTime(0.1,tm);g.gain.exponentialRampToValueAtTime(0.001,tm+0.3);o.start(tm);o.stop(tm+0.3);break;case'powerup':o.type='sine';o.frequency.setValueAtTime(580,tm);o.frequency.setValueAtTime(870,tm+0.06);o.frequency.setValueAtTime(1160,tm+0.12);g.gain.setValueAtTime(0.07,tm);g.gain.exponentialRampToValueAtTime(0.001,tm+0.2);o.start(tm);o.stop(tm+0.2);break;case'die':o.type='sawtooth';o.frequency.setValueAtTime(380,tm);o.frequency.exponentialRampToValueAtTime(25,tm+0.5);g.gain.setValueAtTime(0.12,tm);g.gain.exponentialRampToValueAtTime(0.001,tm+0.5);o.start(tm);o.stop(tm+0.5);break;case'boss':o.type='square';o.frequency.setValueAtTime(120,tm);o.frequency.setValueAtTime(95,tm+0.1);o.frequency.setValueAtTime(120,tm+0.2);o.frequency.setValueAtTime(70,tm+0.3);g.gain.setValueAtTime(0.1,tm);g.gain.exponentialRampToValueAtTime(0.001,tm+0.45);o.start(tm);o.stop(tm+0.45);break;case'levelup':o.type='sine';[587,740,880,1175].forEach((f,i)=>o.frequency.setValueAtTime(f,tm+i*0.08));g.gain.setValueAtTime(0.07,tm);g.gain.exponentialRampToValueAtTime(0.001,tm+0.4);o.start(tm);o.stop(tm+0.4);break;case'warn':o.type='square';o.frequency.setValueAtTime(80,tm);g.gain.setValueAtTime(0.06,tm);g.gain.exponentialRampToValueAtTime(0.001,tm+0.2);o.start(tm);o.stop(tm+0.2);break;case'pause':o.type='sine';o.frequency.setValueAtTime(440,tm);o.frequency.setValueAtTime(330,tm+0.05);g.gain.setValueAtTime(0.04,tm);g.gain.exponentialRampToValueAtTime(0.001,tm+0.08);o.start(tm);o.stop(tm+0.08);break;case'select':o.type='square';o.frequency.setValueAtTime(660,tm);g.gain.setValueAtTime(0.03,tm);g.gain.exponentialRampToValueAtTime(0.001,tm+0.04);o.start(tm);o.stop(tm+0.04);break}}

// ===== STATE =====
let state='menu',score=0,hiScore=parseInt(localStorage.getItem('si_hi6'))||0;
let level=1,lives=3,weaponLv=1,frame=0;
let spawnTimer=0,levelKills=0,levelGoal=12;
let bossActive=false,shakeX=0,shakeY=0,shakeT=0;
let levelUpTimer=0,comboCount=0,comboTimer=0,totalKills=0,bossWarning=0;
let pauseCursor=0,themeCursor=0,sharpCursor=1;
const pauseItems=['RESUME','THEME','SHARPNESS','SOUND','RESTART','QUIT'];
const themeKeys=['high','min','nokia'];

// ===== STARS =====
const allStars=[];
for(let i=0;i<120;i++)allStars.push({x:Math.random()*GW,y:Math.random()*GH,speed:0.08+Math.random()*0.9,size:Math.random()<0.08?2:1,bright:0.1+Math.random()*0.45,type:'w'});
const starColors=['#ff4422','#2299ff','#ffaa00','#44ff88','#ff55aa','#aabb22'];
for(let i=0;i<15;i++)allStars.push({x:Math.random()*GW,y:Math.random()*GH,speed:0.12+Math.random()*0.3,size:1,bright:0.5+Math.random()*0.4,color:starColors[i%6],type:'c'});
const nebulae=[];
for(let i=0;i<5;i++)nebulae.push({x:Math.random()*GW,y:Math.random()*GH,r:70+Math.random()*100,color:['rgba(0,50,35,','rgba(35,0,45,','rgba(0,25,55,','rgba(45,15,0,','rgba(10,30,10,'][i],speed:0.03+Math.random()*0.08});
function getActiveStars(){const t=T(),mx=t.starCount,cl=Math.min(t.coloredStars,mx);return[...allStars.filter(s=>s.type==='w').slice(0,mx-cl),...allStars.filter(s=>s.type==='c').slice(0,cl)]}

let player={},pBullets=[],eBullets=[],enemies=[],particles=[],powerups=[],floatTexts=[];

function resetPlayer(){player={x:28,y:GH/2-12,w:32,h:24,alive:true,inv:0,shootCD:0}}
function startGame(){initAudio();state='playing';score=0;level=1;lives=3;weaponLv=1;levelKills=0;levelGoal=12;bossActive=false;comboCount=0;comboTimer=0;totalKills=0;bossWarning=0;resetPlayer();pBullets=[];eBullets=[];enemies=[];particles=[];powerups=[];floatTexts=[];spawnTimer=90}
function nextLevel(){level++;levelKills=0;levelGoal=10+level*3;bossActive=false;weaponLv=Math.min(5,weaponLv+1);pBullets=[];eBullets=[];enemies=[];powerups=[];spawnTimer=110;state='levelup';levelUpTimer=130;sfx('levelup')}
function pauseGame(){if(state==='playing'){state='paused';pauseCursor=0;themeCursor=themeKeys.indexOf(currentTheme);sharpCursor=sharpness;sfx('pause')}}
function resumeGame(){state='playing'}

const keys={};let keyJustPressed={};
document.addEventListener('keydown',e=>{
  if(keys[e.code])return;keys[e.code]=true;keyJustPressed[e.code]=true;
  if(['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Enter','Escape'].includes(e.code))e.preventDefault();
  if(state==='menu'||state==='gameover'){if(e.code==='Enter'||e.code==='Space')startGame();return}
  if(state==='playing'){if(e.code==='Escape'||e.code==='KeyP')pauseGame()}
  else if(state==='paused'){
    if(e.code==='Escape'||e.code==='KeyP')resumeGame();
    else if(e.code==='ArrowUp'||e.code==='KeyW'){pauseCursor=(pauseCursor-1+pauseItems.length)%pauseItems.length;sfx('select')}
    else if(e.code==='ArrowDown'||e.code==='KeyS'){pauseCursor=(pauseCursor+1)%pauseItems.length;sfx('select')}
    else if(e.code==='Enter'||e.code==='Space')handlePauseConfirm();
    else if(e.code==='ArrowLeft')handlePauseLeft();
    else if(e.code==='ArrowRight')handlePauseRight();
  }
});
document.addEventListener('keyup',e=>{keys[e.code]=false});
function handlePauseConfirm(){switch(pauseCursor){case 0:resumeGame();break;case 1:themeCursor=(themeCursor+1)%3;currentTheme=themeKeys[themeCursor];applyThemeCSS();sfx('select');break;case 2:sharpCursor=(sharpCursor+1)%3;sharpness=sharpCursor;applySharpness();sfx('select');break;case 3:soundOn=!soundOn;sfx('select');break;case 4:startGame();break;case 5:state='menu';break}}
function handlePauseLeft(){if(pauseCursor===1){themeCursor=(themeCursor-1+3)%3;currentTheme=themeKeys[themeCursor];applyThemeCSS();sfx('select')}else if(pauseCursor===2){sharpCursor=(sharpCursor-1+3)%3;sharpness=sharpCursor;applySharpness();sfx('select')}}
function handlePauseRight(){if(pauseCursor===1){themeCursor=(themeCursor+1)%3;currentTheme=themeKeys[themeCursor];applyThemeCSS();sfx('select')}else if(pauseCursor===2){sharpCursor=(sharpCursor+1)%3;sharpness=sharpCursor;applySharpness();sfx('select')}}

function addFloatText(x,y,text,color){floatTexts.push({x,y,text,color,life:35,maxLife:35})}
function spawnParticles(x,y,count,color,spd){if(!T().particles)return;for(let i=0;i<count;i++){const a=Math.random()*Math.PI*2,s=0.3+Math.random()*spd;particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:12+Math.random()*22,maxLife:34,size:0.6+Math.random()*2.2,color})}}
function spawnExplosion(x,y,big){const t=T(),n=big?t.explodeCount:t.explodeSmall;spawnParticles(x,y,n,'#ff8822',big?3.5:1.8);spawnParticles(x,y,Math.floor(n*0.5),'#ffdd44',big?2.2:1);if(big){spawnParticles(x,y,12,'#ff3300',4);spawnParticles(x,y,8,'#ffffff',2.2);shakeT=16;sfx('explode')}else sfx('hit');if(t.isNokia){for(let i=0;i<(big?8:4);i++)particles.push({x:x+(Math.random()-0.5)*(big?40:20),y:y+(Math.random()-0.5)*(big?40:20),vx:(Math.random()-0.5)*2,vy:(Math.random()-0.5)*2,life:15+Math.random()*10,maxLife:25,size:3+Math.random()*4,color:'#000000'})}}

// ===== ENEMIES =====
function spawnEnemy(){const pool=[];pool.push('drone','drone','drone');pool.push('sine','sine');pool.push('fast','fast');if(level>=2)pool.push('shooter','shooter','bomber');if(level>=3)pool.push('tank','seeker');if(level>=4)pool.push('shooter','tank','bomber','seeker');if(level>=5)pool.push('spinner','spinner','tank','seeker');if(level>=6)pool.push('spinner','bomber','shooter');
const type=pool[Math.floor(Math.random()*pool.length)];const e={x:GW+14,y:25+Math.random()*(GH-60),type,age:0,shootCD:0,hitFlash:0,baseY:0,rot:0};
switch(type){case'drone':Object.assign(e,{w:20,h:18,hp:1,speed:0.8+level*0.06,pts:10});break;case'fast':Object.assign(e,{w:16,h:14,hp:1,speed:2+level*0.1,pts:20});break;case'sine':Object.assign(e,{w:20,h:18,hp:1,speed:0.6+level*0.04,pts:15,amp:25+Math.random()*30,freq:0.02+Math.random()*0.02});break;case'shooter':Object.assign(e,{w:24,h:20,hp:2,speed:0.5+level*0.03,pts:30,shootCD:60+Math.random()*40});break;case'bomber':Object.assign(e,{w:22,h:22,hp:2,speed:0.4+level*0.03,pts:35,shootCD:50+Math.random()*30});break;case'tank':Object.assign(e,{w:30,h:24,hp:5+Math.floor(level/2),speed:0.3+level*0.02,pts:60});break;case'seeker':Object.assign(e,{w:16,h:16,hp:1,speed:1.2+level*0.06,pts:25});break;case'spinner':Object.assign(e,{w:24,h:24,hp:3,speed:0.35+level*0.02,pts:45,shootCD:40+Math.random()*20});break}
e.baseY=e.y;enemies.push(e)}
function spawnBoss(){bossActive=true;bossWarning=60;sfx('boss');const hp=22+level*12;enemies.push({x:GW+60,y:GH/2-24,w:64,h:48,hp,maxHp:hp,speed:0.5,pts:600+level*300,type:'boss',age:0,shootCD:45,phase:0,baseY:GH/2,hitFlash:0,attackMode:0,modeTimer:0})}
function spawnPowerup(x,y){const t=['life','weapon','weapon','weapon','weapon'];powerups.push({x,y,type:t[Math.floor(Math.random()*t.length)],age:0})}

function playerShoot(){const px=player.x+player.w,py=player.y+player.h/2,spd=5.5;switch(weaponLv){case 1:pBullets.push({x:px,y:py,vx:spd,vy:0,dmg:1,size:3});break;case 2:pBullets.push({x:px,y:py-4,vx:spd,vy:0,dmg:1,size:3});pBullets.push({x:px,y:py+4,vx:spd,vy:0,dmg:1,size:3});break;case 3:pBullets.push({x:px,y:py,vx:spd,vy:0,dmg:1,size:3});pBullets.push({x:px,y:py-8,vx:spd*0.93,vy:-0.8,dmg:1,size:2.5});pBullets.push({x:px,y:py+8,vx:spd*0.93,vy:0.8,dmg:1,size:2.5});break;case 4:pBullets.push({x:px,y:py-5,vx:spd,vy:0,dmg:1,size:3});pBullets.push({x:px,y:py+5,vx:spd,vy:0,dmg:1,size:3});pBullets.push({x:px,y:py-13,vx:spd*0.86,vy:-1.2,dmg:1,size:2});pBullets.push({x:px,y:py+13,vx:spd*0.86,vy:1.2,dmg:1,size:2});break;default:pBullets.push({x:px,y:py,vx:spd*1.15,vy:0,dmg:2,size:4});pBullets.push({x:px,y:py-6,vx:spd,vy:-0.4,dmg:1,size:3});pBullets.push({x:px,y:py+6,vx:spd,vy:0.4,dmg:1,size:3});pBullets.push({x:px,y:py-15,vx:spd*0.8,vy:-1.4,dmg:1,size:2});pBullets.push({x:px,y:py+15,vx:spd*0.8,vy:1.4,dmg:1,size:2});break}sfx('shoot')}
function boxHit(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y}

// ===== UPDATE =====
function update(){frame++;allStars.forEach(s=>{s.x-=s.speed;if(s.x<-2){s.x=GW+2;s.y=Math.random()*GH}});nebulae.forEach(n=>{n.x-=n.speed;if(n.x<-n.r*2){n.x=GW+n.r*2;n.y=Math.random()*GH}});if(shakeT>0){shakeT--;shakeX=(Math.random()-0.5)*6;shakeY=(Math.random()-0.5)*6}else{shakeX=0;shakeY=0}for(let i=floatTexts.length-1;i>=0;i--){floatTexts[i].y-=0.7;floatTexts[i].life--;if(floatTexts[i].life<=0)floatTexts.splice(i,1)}
if(state==='levelup'){levelUpTimer--;if(levelUpTimer<=0)state='playing';keyJustPressed={};return}if(state!=='playing'){keyJustPressed={};return}if(bossWarning>0){bossWarning--;if(bossWarning===30)sfx('warn');keyJustPressed={};return}if(comboTimer>0){comboTimer--;if(comboTimer<=0)comboCount=0}
let dx=0,dy=0;if(keys['ArrowUp']||keys['KeyW'])dy-=3.2;if(keys['ArrowDown']||keys['KeyS'])dy+=3.2;if(keys['ArrowLeft']||keys['KeyA'])dx-=3.2;if(keys['ArrowRight']||keys['KeyD'])dx+=3.2;if(dx&&dy){dx*=0.707;dy*=0.707}player.x=Math.max(2,Math.min(GW-player.w-2,player.x+dx));player.y=Math.max(28,Math.min(GH-28-player.h,player.y+dy));if(player.shootCD>0)player.shootCD--;if(player.shootCD<=0){playerShoot();player.shootCD=Math.max(3,9-weaponLv)}if(player.inv>0)player.inv--;if(T().particles&&frame%2===0)particles.push({x:player.x-1+Math.random()*2,y:player.y+player.h/2+(Math.random()-0.5)*8,vx:-1.5-Math.random()*2,vy:(Math.random()-0.5)*0.5,life:6+Math.random()*5,maxLife:11,size:1+Math.random()*1.6,color:Math.random()<0.35?'#ff5511':Math.random()<0.6?'#ff9922':'#ffcc44'});
if(!bossActive){spawnTimer--;if(spawnTimer<=0){spawnEnemy();spawnTimer=Math.max(14,55-level*3)+Math.random()*20}if(levelKills>=levelGoal&&enemies.length===0)spawnBoss()}
for(let i=enemies.length-1;i>=0;i--){const e=enemies[i];e.age++;if(e.hitFlash>0)e.hitFlash--;if(e.type==='boss'){if(e.x>GW-e.w-30)e.x-=1;else{e.phase+=0.012;e.y=GH/2-e.h/2+Math.sin(e.phase)*85;e.modeTimer++;if(e.modeTimer>120){e.attackMode=(e.attackMode+1)%3;e.modeTimer=0}e.shootCD--;if(e.shootCD<=0){const cx=e.x+4,cy=e.y+e.h/2;if(e.attackMode===0){e.shootCD=Math.max(10,30-level*2);for(let a=-3;a<=3;a++)eBullets.push({x:cx,y:cy,vx:-3+a*0.4,vy:a*0.5,size:3})}else if(e.attackMode===1){e.shootCD=Math.max(15,35-level*2);for(let a=-1;a<=1;a++)eBullets.push({x:cx,y:cy,vx:-4,vy:a*1.8,size:3})}else{e.shootCD=8;const ang=Math.atan2(player.y+player.h/2-cy,player.x+player.w/2-cx);eBullets.push({x:cx,y:cy,vx:Math.cos(ang)*4,vy:Math.sin(ang)*4,size:4})}}}}else{e.x-=e.speed;switch(e.type){case'sine':e.y=e.baseY+Math.sin(e.age*e.freq)*e.amp;break;case'shooter':e.shootCD--;if(e.shootCD<=0&&e.x<GW-50){e.shootCD=Math.max(30,70-level*4);eBullets.push({x:e.x,y:e.y+e.h/2,vx:-3.2,vy:0,size:2.5})}break;case'bomber':e.shootCD--;if(e.shootCD<=0&&e.x<GW-60){e.shootCD=Math.max(35,60-level*3);for(let a=-1;a<=1;a++)eBullets.push({x:e.x,y:e.y+e.h/2,vx:-2.2,vy:a*1.2,size:2.5})}break;case'seeker':{const tx=player.y+player.h/2-e.y-e.h/2;e.y+=Math.sign(tx)*Math.min(Math.abs(tx)*0.015,1.2);break}case'spinner':e.rot=(e.rot||0)+0.05;e.shootCD--;if(e.shootCD<=0&&e.x<GW-50){e.shootCD=Math.max(25,50-level*2);const r=e.rot;eBullets.push({x:e.x+e.w/2,y:e.y+e.h/2,vx:Math.cos(r)*2.5,vy:Math.sin(r)*2.5,size:2})}break}}if(e.x<-e.w-20){enemies.splice(i,1);continue}if(player.alive&&player.inv<=0&&boxHit(player,e)){playerHit();if(e.type!=='boss'){spawnExplosion(e.x+e.w/2,e.y+e.h/2,false);enemies.splice(i,1);levelKills++;totalKills++}continue}}

function drawBossWarning(){if(bossWarning<=0)return;const t=T();const flash=Math.floor(bossWarning/6)%2===0;X.fillStyle=flash?t.warnFlash:'rgba(0,0,0,0)';X.fillRect(0,0,GW,GH);X.globalAlpha=Math.min(1,bossWarning/20);X.fillStyle=t.warnColor;X.font='700 16px '+F_UI;X.textAlign='center';X.textBaseline='middle';X.fillText('WARNING',GW/2,GH/2-8);X.fillStyle=t.warnSub;X.font='600 9px '+F_UI;X.fillText('BOSS APPROACHING',GW/2,GH/2+12);X.textBaseline='alphabetic';X.globalAlpha=1}

// ===== MENU SCREEN (Chakra Petch main, pixel font for title only) =====
function drawMenu(){
  const t=T();X.fillStyle=t.isNokia?'rgba(200,200,180,0.5)':'rgba(2,2,10,0.5)';X.fillRect(0,0,GW,GH);X.textAlign='center';X.textBaseline='middle';
  if(!t.isNokia){const grd=X.createRadialGradient(GW/2,GH/2-50,8,GW/2,GH/2-50,160);grd.addColorStop(0,currentTheme==='min'?'rgba(100,120,160,0.04)':'rgba(0,255,136,0.05)');grd.addColorStop(1,'rgba(0,0,0,0)');X.fillStyle=grd;X.fillRect(0,GH/2-210,GW,320)}

  // Title uses pixel font for retro feel
  X.fillStyle=t.menuTitle1;X.font='16px '+F_PIXEL;X.fillText('SPACE',GW/2,GH/2-68);
  X.fillStyle=t.menuTitle2;X.font='16px '+F_PIXEL;X.fillText('IMPACT',GW/2,GH/2-48);
  X.fillStyle=t.panelBorder;X.fillRect(GW/2-70,GH/2-34,140,1);

  // Subtitle in clean UI font
  X.fillStyle=t.menuSub;X.font='600 7px '+F_UI;X.fillText('8 ENEMIES  \u00B7  3 THEMES  \u00B7  SHARPNESS',GW/2,GH/2-22);
  X.fillStyle=t.hudAccent;X.font='600 8px '+F_UI;X.fillText('[ '+themes[currentTheme].name+'  |  '+sharpLabels[sharpness]+' ]',GW/2,GH/2-8);

  // Enemy showcase
  const ey=GH/2+10;
  drawDrone(GW/2-168,ey-6,false);drawFast(GW/2-120,ey-5,false);drawSine(GW/2-72,ey-6,false);drawShooter(GW/2-22,ey-7,false);drawBomber(GW/2+30,ey-8,false);drawTank(GW/2+80,ey-9,false);drawSeeker(GW/2+132,ey-5,false);
  X.save();X.translate(GW/2+178,ey+1);X.rotate(frame*0.02);const sc=ec(false,'spinner');X.fillStyle=sc[1];X.fillRect(-8,-8,16,16);X.fillStyle=sc[2];X.fillRect(-6,-6,12,12);X.fillStyle=sc[0];X.fillRect(-10,-3,5,6);X.fillRect(5,-3,5,6);X.fillRect(-3,-10,6,5);X.fillRect(-3,5,6,5);if(!t.isNokia){X.fillStyle='#afa';X.fillRect(-2,-2,4,4)}X.restore();
  X.fillStyle=t.menuSub;X.font='600 6px '+F_UI;['DRONE','FAST','SINE','SHOOT','BOMB','TANK','SEEK','SPIN'].forEach((n,i)=>X.fillText(n,GW/2-158+i*50,ey+18));

  if(Math.floor(frame/26)%2===0){X.fillStyle=t.hudLabel;X.font='700 11px '+F_UI;X.fillText('PRESS ENTER TO START',GW/2,GH/2+48)}
  drawPanel(GW/2-150,GH/2+60,300,36,0.7);X.fillStyle=t.menuCtrl;X.font='600 7px '+F_UI;
  X.fillText('WASD / ARROWS MOVE     AUTO-FIRE ON     ESC PAUSE',GW/2,GH/2+70);
  X.fillText('THEME & SHARPNESS IN PAUSE MENU',GW/2,GH/2+84);
  if(hiScore>0){X.fillStyle=t.hudAccent;X.font='700 9px '+F_UI;X.fillText('HIGH SCORE  '+hiScore,GW/2,GH/2+106)}
  X.textBaseline='alphabetic';
}

function drawGameOver(){
  const t=T();X.fillStyle=t.isNokia?'rgba(200,200,180,0.7)':'rgba(2,2,10,0.75)';X.fillRect(0,0,GW,GH);X.textAlign='center';X.textBaseline='middle';
  if(!t.isNokia){const grd=X.createRadialGradient(GW/2,GH/2-20,5,GW/2,GH/2-20,130);grd.addColorStop(0,currentTheme==='min'?'rgba(200,30,30,0.05)':'rgba(255,0,0,0.07)');grd.addColorStop(1,'rgba(0,0,0,0)');X.fillStyle=grd;X.fillRect(0,GH/2-150,GW,260)}
  X.fillStyle=t.goTitle;X.font='700 18px '+F_UI;X.fillText('GAME OVER',GW/2,GH/2-52);
  X.fillStyle=t.panelBorder;X.fillRect(GW/2-90,GH/2-36,180,1);
  drawPanel(GW/2-100,GH/2-26,200,70,0.82);
  X.font='600 9px '+F_UI;X.fillStyle=t.hudLabel;X.fillText('SCORE',GW/2,GH/2-10);
  X.font='700 16px '+F_UI;X.fillStyle=t.goScore;X.fillText(String(score),GW/2,GH/2+10);
  X.font='600 8px '+F_UI;X.fillStyle=t.hudLabel;X.fillText('LEVEL '+level+'    KILLS '+totalKills,GW/2,GH/2+30);
  if(score>=hiScore&&score>0){X.fillStyle=t.hudAccent;X.font='700 10px '+F_UI;X.globalAlpha=0.7+Math.sin(frame*0.08)*0.3;X.fillText('NEW HIGH SCORE',GW/2,GH/2+56);X.globalAlpha=1}
  else{X.fillStyle=t.menuSub;X.font='600 8px '+F_UI;X.fillText('BEST  '+hiScore,GW/2,GH/2+56)}
  if(Math.floor(frame/26)%2===0){X.fillStyle=t.hudLabel;X.font='700 10px '+F_UI;X.fillText('PRESS ENTER TO RETRY',GW/2,GH/2+82)}
  X.textBaseline='alphabetic';
}

function drawLevelUp(){const t=T();const a=Math.min(1,levelUpTimer/25);X.globalAlpha=a*0.55;X.fillStyle=t.isNokia?t.bg:'rgba(2,2,10,0.8)';X.fillRect(0,0,GW,GH);X.globalAlpha=a;X.textAlign='center';X.textBaseline='middle';X.fillStyle=t.menuTitle1;X.font='700 18px '+F_UI;X.fillText('LEVEL '+level,GW/2,GH/2-10);X.fillStyle=t.hudWpn;X.font='600 9px '+F_UI;X.fillText('WEAPON UPGRADED TO LV '+weaponLv,GW/2,GH/2+14);X.textBaseline='alphabetic';X.globalAlpha=1}

function drawPostFX(){const t=T();if(t.scanlines){X.fillStyle='rgba(0,0,0,0.035)';for(let y=0;y<GH;y+=2)X.fillRect(0,y,GW,1)}
if(t.vignette){const vg=X.createRadialGradient(GW/2,GH/2,GH*0.38,GW/2,GH/2,GH*0.78);vg.addColorStop(0,'rgba(0,0,0,0)');vg.addColorStop(1,'rgba(0,0,0,0.3)');X.fillStyle=vg;X.fillRect(0,0,GW,GH)}}

// ===== MAIN RENDER =====
function render(){
  const t=T();X.save();X.translate(Math.round(shakeX),Math.round(shakeY));
  X.fillStyle=t.bg;X.fillRect(-8,-8,GW+16,GH+16);
  if(t.isNokia){X.fillStyle='rgba(0,0,0,0.04)';for(let gx=0;gx<GW;gx+=4)for(let gy=0;gy<GH;gy+=4)X.fillRect(gx,gy,1,1)}
  if(t.nebulae){nebulae.forEach(n=>{const g=X.createRadialGradient(n.x,n.y,0,n.x,n.y,n.r);g.addColorStop(0,n.color+'0.05)');g.addColorStop(1,n.color+'0)');X.fillStyle=g;X.fillRect(n.x-n.r,n.y-n.r,n.r*2,n.r*2)})}
  getActiveStars().forEach(s=>{X.fillStyle=s.color||`rgba(140,160,180,${s.bright})`;X.fillRect(Math.floor(s.x),Math.floor(s.y),s.size,s.size)});
  particles.forEach(p=>{if(t.isNokia){X.globalAlpha=Math.max(0,p.life/p.maxLife);X.fillStyle=p.color;X.fillRect(Math.floor(p.x-p.size/2),Math.floor(p.y-p.size/2),Math.ceil(p.size),Math.ceil(p.size))}else{const a=Math.max(0,p.life/p.maxLife);X.globalAlpha=a;X.fillStyle=p.color;const s=Math.ceil(p.size*a);X.fillRect(Math.floor(p.x-s/2),Math.floor(p.y-s/2),s,s)}});X.globalAlpha=1;
  powerups.forEach(p=>{const pulse=0.85+Math.sin(p.age*0.12)*0.15;X.save();X.translate(Math.floor(p.x),Math.floor(p.y));X.scale(pulse,pulse);if(t.glows){const pg=X.createRadialGradient(0,0,2,0,0,14);pg.addColorStop(0,p.type==='life'?`rgba(68,255,102,${t.puGlow})`:`rgba(68,170,255,${t.puGlow})`);pg.addColorStop(1,'rgba(0,0,0,0)');X.fillStyle=pg;X.fillRect(-14,-14,28,28)}if(p.type==='life'){X.fillStyle=t.isNokia?'#000':'#4f6';X.fillRect(-4,-1,8,2);X.fillRect(-1,-4,2,8);X.strokeStyle=t.isNokia?'#000':'#2c4';X.lineWidth=1;X.strokeRect(-7,-7,14,14)}else{X.fillStyle=t.isNokia?'#000':'#4af';X.fillRect(-5,-1,10,2);X.fillRect(-2,-4,4,8);X.fillRect(2,-6,2,3);X.strokeStyle=t.isNokia?'#000':'#26c';X.lineWidth=1;X.strokeRect(-7,-7,14,14)}X.restore()});
  eBullets.forEach(b=>{if(t.glows){const bg=X.createRadialGradient(b.x,b.y,0,b.x,b.y,7);bg.addColorStop(0,t.eBulletGlow);bg.addColorStop(1,'rgba(0,0,0,0)');X.fillStyle=bg;X.fillRect(b.x-7,b.y-7,14,14)}X.fillStyle=t.isNokia?'#000':'#f46';X.fillRect(Math.floor(b.x-b.size/2),Math.floor(b.y-b.size/2),b.size,b.size);if(!t.isNokia){X.fillStyle='#fac';X.fillRect(Math.floor(b.x-1),Math.floor(b.y-1),2,2)}});
  pBullets.forEach(b=>{if(t.glows){const bg=X.createRadialGradient(b.x,b.y,0,b.x,b.y,5);bg.addColorStop(0,t.pBulletGlow);bg.addColorStop(1,'rgba(0,0,0,0)');X.fillStyle=bg;X.fillRect(b.x-5,b.y-5,10,10)}X.fillStyle=t.isNokia?'#000':'#0fa';X.fillRect(Math.floor(b.x-b.size/2),Math.floor(b.y-b.size/2),b.size,b.size);if(!t.isNokia){X.fillStyle='#cfe';X.fillRect(Math.floor(b.x),Math.floor(b.y),Math.max(1,b.size-2),Math.max(1,b.size-2))}});
  enemies.forEach(e=>drawEnemy(e));
  if(player.alive&&(player.inv<=0||Math.floor(player.inv/3)%2===0)){if(t.glows&&!t.isNokia){const pg=X.createRadialGradient(player.x+player.w/2,player.y+player.h/2,4,player.x+player.w/2,player.y+player.h/2,28);pg.addColorStop(0,`rgba(0,255,136,${t.shipGlow})`);pg.addColorStop(1,'rgba(0,0,0,0)');X.fillStyle=pg;X.fillRect(player.x-14,player.y-14,player.w+28,player.h+28)}drawShip(Math.floor(player.x),Math.floor(player.y),false)}
  floatTexts.forEach(ft=>{X.globalAlpha=Math.max(0,ft.life/ft.maxLife);X.fillStyle=ft.color;X.font='700 8px '+F_UI;X.textAlign='center';X.fillText(ft.text,Math.floor(ft.x),Math.floor(ft.y))});X.globalAlpha=1;
  drawPostFX();drawHUD();if(bossWarning>0)drawBossWarning();
  if(state==='menu')drawMenu();if(state==='gameover')drawGameOver();if(state==='levelup')drawLevelUp();if(state==='paused')drawPauseMenu();
  X.restore();
}

applyThemeCSS();applySharpness();
function loop(){update();render();requestAnimationFrame(loop)}
requestAnimationFrame(loop);
</script>
