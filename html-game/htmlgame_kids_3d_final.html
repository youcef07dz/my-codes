<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>مغامرة الفقاعات المجسمة ✨</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&family=Tajawal:wght@700;900&display=swap');

:root {
--kid-pink: #FF85B3;
--kid-blue: #70D6FF;
--kid-yellow: #FFD670;
--kid-green: #99FFAC;
--kid-purple: #B185FF;
--kid-orange: #FF9770;
--white: #FFFFFF;
}

* {
margin: 0;
padding: 0;
box-sizing: border-box;
-webkit-tap-highlight-color: transparent;
user-select: none;
touch-action: manipulation;
}

body {
font-family: 'Tajawal', sans-serif;
background: #A0E9FF;
background: linear-gradient(180deg, #70D6FF 0%, #A0E9FF 100%);
min-height: 100vh;
display: flex;
justify-content: center;
align-items: center;
padding: 15px;
}

/* Background Decor */
#decor-bg {
position: fixed;
inset: 0;
z-index: -1;
overflow: hidden;
}

.bg-bubble {
position: absolute;
border-radius: 50%;
background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.4), rgba(255,255,255,0.05));
backdrop-filter: blur(2px);
box-shadow: inset -10px -10px 20px rgba(0,0,0,0.05), inset 10px 10px 20px rgba(255,255,255,0.2);
animation: floatUp 15s infinite linear;
}

@keyframes floatUp {
from { transform: translateY(110vh) rotate(0deg); }
to { transform: translateY(-20vh) rotate(360deg); }
}

/* Polished 3D Container */
.game-wrapper {
width: 100%;
max-width: 450px;
background: #F0F9FF;
border: 10px solid #FFF;
border-radius: 50px;
padding: 30px;
/* Static but deep 3D shadow */
box-shadow: 
0 10px 0 #D0EFFF, 
0 20px 0 #B0DFEF,
0 40px 60px rgba(0,0,0,0.15);
position: relative;
}

/* Screens */
.screen {
display: none;
text-align: center;
}

.screen.active {
display: flex;
flex-direction: column;
align-items: center;
animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
}

@keyframes popIn {
0% { transform: scale(0.8); opacity: 0; }
100% { transform: scale(1); opacity: 1; }
}

/* Improved 3D Title */
.title {
font-family: 'Fredoka', 'Tajawal', sans-serif;
font-size: clamp(2.2rem, 10vw, 3.5rem);
color: #FF6B6B;
text-shadow: 
0 2px 0 #FFF,
0 4px 0 #FFF,
0 6px 0 #FF9B9B,
0 8px 0 #FF9B9B,
0 12px 15px rgba(0,0,0,0.15);
margin-bottom: 30px;
}

/* Enhanced 3D Buttons */
.kid-btn {
width: 100%;
max-width: 320px;
padding: 20px;
margin: 15px 0;
border: none;
border-radius: 30px;
font-size: 1.6rem;
font-weight: 900;
color: white;
cursor: pointer;
position: relative;
transition: all 0.1s ease;
display: flex;
align-items: center;
justify-content: center;
gap: 15px;
text-shadow: 0 2px 4px rgba(0,0,0,0.2);
}

/* Button Depth with better lighting */
.btn-pink { 
background: var(--kid-pink); 
box-shadow: 0 10px 0 #E06090, 0 15px 25px rgba(255, 133, 179, 0.4); 
}
.btn-blue { 
background: var(--kid-blue); 
box-shadow: 0 10px 0 #4D96FF, 0 15px 25px rgba(112, 214, 255, 0.4); 
}
.btn-yellow { 
background: var(--kid-yellow); 
color: #664d00; 
box-shadow: 0 10px 0 #EBB12E, 0 15px 25px rgba(255, 214, 112, 0.4); 
}
.btn-green { 
background: var(--kid-green); 
color: #1e5a2b; 
box-shadow: 0 10px 0 #6BCF7F, 0 15px 25px rgba(153, 255, 172, 0.4); 
}
.btn-orange { 
background: var(--kid-orange); 
box-shadow: 0 10px 0 #E07050, 0 15px 25px rgba(255, 151, 112, 0.4); 
}

.kid-btn:hover { transform: translateY(-2px); }
.kid-btn:active {
transform: translateY(8px);
box-shadow: 0 2px 0 rgba(0,0,0,0.2), 0 5px 10px rgba(0,0,0,0.1);
}

/* High-Quality 3D Bubble Cards */
.grid {
display: grid;
gap: 15px;
width: 100%;
margin: 20px 0;
}

.bubble-card {
width: 100%;
aspect-ratio: 1/1;
cursor: pointer;
perspective: 1000px;
}

.card-inner {
position: relative;
width: 100%;
height: 100%;
transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
transform-style: preserve-3d;
}

.bubble-card.flipped .card-inner {
transform: rotateY(180deg);
}

.face {
position: absolute;
width: 100%;
height: 100%;
backface-visibility: hidden;
-webkit-backface-visibility: hidden;
border-radius: 50%;
display: flex;
align-items: center;
justify-content: center;
font-size: clamp(1.8rem, 8vw, 3rem);
border: 5px solid white;
/* Improved lighting for a real 3D bubble look */
box-shadow: 
inset -8px -8px 20px rgba(0,0,0,0.1),
inset 8px 8px 20px rgba(255,255,255,0.6),
0 8px 0 rgba(0,0,0,0.1),
0 15px 30px rgba(0,0,0,0.1);
}

.face-back {
background: radial-gradient(circle at 30% 30%, #FFB6D1, #FF85B3 40%, #FF4D94);
color: white;
}

.face-front {
background: radial-gradient(circle at 30% 30%, #FFFFFF, #F0F9FF);
transform: rotateY(180deg);
color: #2D3047;
}

.bubble-card:active .card-inner {
transform: scale(0.9);
}

/* Stats */
.stats {
display: flex;
width: 100%;
justify-content: space-around;
background: #FFF;
padding: 15px;
border-radius: 25px;
margin-bottom: 20px;
box-shadow: inset 0 5px 10px rgba(0,0,0,0.05), 0 5px 0 rgba(0,0,0,0.02);
font-weight: 900;
color: #4D96FF;
font-size: 1.5rem;
}

.timer-container {
width: 100%;
height: 22px;
background: #E0EFFF;
border-radius: 20px;
margin-bottom: 20px;
padding: 5px;
box-shadow: inset 0 4px 8px rgba(0,0,0,0.1);
}

.timer-fill {
height: 100%;
width: 100%;
background: linear-gradient(to right, #FF85B3, #FFD670);
border-radius: 20px;
box-shadow: 0 2px 5px rgba(255, 133, 179, 0.4);
transition: width 0.1s linear;
}

/* Celebration */
.confetti {
position: fixed;
width: 12px;
height: 12px;
z-index: 1000;
pointer-events: none;
border-radius: 3px;
}

</style>
</head>
<body>

<div id="decor-bg"></div>

<div class="game-wrapper">
<!-- Menu Screen -->
<div id="scr-menu" class="screen active">
<div style="font-size: 6rem; margin-bottom: 10px; filter: drop-shadow(0 10px 15px rgba(0,0,0,0.1));">🎈</div>
<h1 class="title">مغامرة الفقاعات</h1>
<button class="kid-btn btn-pink" onclick="nav('scr-cat')">هيا نلعب! 🌟</button>
<button class="kid-btn btn-blue" onclick="nav('scr-high')">الأبطال 🏆</button>
</div>

<!-- Categories Screen -->
<div id="scr-cat" class="screen">
<h2 class="title" style="font-size: 2rem;">ماذا تحب؟ ✨</h2>
<button class="kid-btn btn-pink" onclick="setCat('animals')">🦁 حيوانات</button>
<button class="kid-btn btn-blue" onclick="setCat('objects')">🎈 ألعاب</button>
<button class="kid-btn btn-yellow" onclick="setCat('num')">🔢 أرقام</button>
<button class="kid-btn btn-green" onclick="setCat('ar')">🔠 حروف</button>
<button class="kid-btn btn-orange" onclick="nav('scr-menu')">رجوع ↩️</button>
</div>

<!-- Levels Screen -->
<div id="scr-levels" class="screen">
<h2 class="title" style="font-size: 2rem;">اختر مرحلة 🗺️</h2>
<div id="lvl-list" style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; width: 100%; margin-bottom: 20px;"></div>
<button class="kid-btn btn-orange" onclick="nav('scr-cat')">رجوع ↩️</button>
</div>

<!-- Game Screen -->
<div id="scr-game" class="screen">
<div class="stats">
<div class="stat-item">⭐ <span id="txt-score">0</span></div>
<div class="stat-item">🏃 <span id="txt-moves">0</span></div>
</div>
<div class="timer-container">
<div id="timer-fill" class="timer-fill"></div>
</div>
<div id="game-board" class="grid"></div>
<button class="kid-btn btn-pink" style="padding: 12px; font-size: 1.1rem; max-width: 160px;" onclick="nav('scr-menu')">🏠 خروج</button>
</div>

<!-- Win Screen -->
<div id="scr-win" class="screen">
<div style="font-size: 6rem; filter: drop-shadow(0 10px 15px rgba(0,0,0,0.1));">🎉</div>
<h1 class="title">أنت بطل!</h1>
<h2 style="color: #FF6B6B; margin-bottom: 20px; font-size: 1.8rem;">كسبت <span id="win-score">0</span> نجمة!</h2>
<button class="kid-btn btn-pink" onclick="nextLevel()">المرحلة التالية ➡️</button>
<button class="kid-btn btn-blue" onclick="nav('scr-menu')">القائمة الرئيسية</button>
</div>

<!-- Fail Screen -->
<div id="scr-fail" class="screen">
<div style="font-size: 6rem; filter: drop-shadow(0 10px 15px rgba(0,0,0,0.1));">☁️</div>
<h1 class="title">حاول ثانية!</h1>
<button class="kid-btn btn-yellow" onclick="retry()">أريد المحاولة 🔄</button>
<button class="kid-btn btn-blue" onclick="nav('scr-menu')">رجوع</button>
</div>

<!-- Leaderboard Screen -->
<div id="scr-high" class="screen">
<h1 class="title" style="font-size: 2.2rem;">لوحة الأبطال 🏆</h1>
<div id="scores-list" style="background: white; border-radius: 30px; padding: 20px; width: 100%; margin-bottom: 20px; text-align: right; box-shadow: inset 0 5px 15px rgba(0,0,0,0.05);"></div>
<button class="kid-btn btn-orange" onclick="nav('scr-menu')">رجوع ↩️</button>
</div>
</div>
<script>
const DATA = {
    ar: ['أ','ب','ت','ث','ج','ح','خ','د','ذ','ر','ز','س','ش','ص','ض','ط','ظ','ع','غ','ف','ق','ك','ل','م','ن','هـ','و','ي'],
    num: ['١','٢','٣','٤','٥','٦','٧','٨','٩','٠'],
    animals: ['🦁','🐯','🦒','🐘','🦊','🐱','🐶','🐰','🐼','🐸','🦄','🐥','🐙','🦓'],
    objects: ['🚀','🎈','🎁','🚗','🚲','🍎','⚽','🎸','🍦','🍕','⏰','🎨','🌈','🍭']
};

// --- Sound System ---
const Sound = {
    ctx: null,
    
    init() {
        if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    },

    play(freq, type, duration, vol = 0.1) {
        this.init();
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
        gain.gain.setValueAtTime(vol, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + duration);
        osc.connect(gain);
        gain.connect(this.ctx.destination);
        osc.start();
        osc.stop(this.ctx.currentTime + duration);
    },

    pop() { this.play(400, 'sine', 0.1, 0.2); },
    click() { this.play(600, 'triangle', 0.05, 0.1); },
    match() {
        this.play(523, 'sine', 0.3); 
        setTimeout(() => this.play(659, 'sine', 0.4), 100); 
    },
    fail() {
        this.play(150, 'sawtooth', 0.6, 0.1);
    },
    win() {
        const notes = [523, 659, 783, 1046];
        notes.forEach((f, i) => setTimeout(() => this.play(f, 'square', 0.5, 0.05), i * 150));
    }
};

let currentLevel = 1, cat = 'animals', score = 0, moves = 0, matches = 0;
let flipped = [], timer, timeLeft, totalTime;

function initBG() {
    const bg = document.getElementById('decor-bg');
    for(let i=0; i<8; i++) {
        const b = document.createElement('div');
        b.className = 'bg-bubble';
        const size = Math.random() * 100 + 40;
        b.style.width = b.style.height = size + 'px';
        b.style.left = Math.random() * 100 + 'vw';
        bg.appendChild(b);
    }
}

function nav(id) {
    Sound.click();
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    if(id === 'scr-levels') renderLevels();
    if(id === 'scr-high') renderScores();
    if(id !== 'scr-game') clearInterval(timer);
}

function setCat(c) { Sound.click(); cat = c; nav('scr-levels'); }

function renderLevels() {
    const list = document.getElementById('lvl-list');
    list.innerHTML = '';
    for(let i=1; i<=12; i++) {
        const b = document.createElement('div');
        b.style.cssText = `aspect-ratio:1/1; background:var(--kid-blue); color:white; border-radius:15px; display:flex; align-items:center; justify-content:center; font-weight:900; cursor:pointer; box-shadow:0 6px 0 #4d96ff, 0 10px 15px rgba(0,0,0,0.1); font-size:1.3rem; transition:0.1s;`;
        b.textContent = i;
        b.onclick = () => { Sound.click(); startGame(i); };
        list.appendChild(b);
    }
}

function startGame(lvl) {
    Sound.init(); // Important for mobile browsers
    currentLevel = lvl; score = 0; moves = 0; matches = 0; flipped = [];
    nav('scr-game');
    const pool = DATA[cat];
    const size = lvl <= 4 ? 6 : (lvl <= 8 ? 8 : 12);
    const selected = [...pool].sort(() => 0.5 - Math.random()).slice(0, size/2);
    const deck = [...selected, ...selected].sort(() => 0.5 - Math.random());
    
    const board = document.getElementById('game-board');
    board.style.gridTemplateColumns = `repeat(${size <= 8 ? 2 : 3}, 1fr)`;
    board.innerHTML = '';
    
    deck.forEach(s => {
        const card = document.createElement('div');
        card.className = 'bubble-card';
        card.innerHTML = `<div class="card-inner"><div class="face face-back">?</div><div class="face face-front">${s}</div></div>`;
        card.onclick = () => flip(card, s);
        board.appendChild(card);
    });
    
    totalTime = 60; timeLeft = 60;
    updateStats();
    timer = setInterval(() => {
        timeLeft -= 0.1;
        document.getElementById('timer-fill').style.width = (timeLeft/totalTime)*100 + '%';
        if(timeLeft <= 0) { 
            clearInterval(timer); 
            Sound.fail();
            nav('scr-fail'); 
        }
    }, 100);
}

function flip(card, s) {
    if(flipped.length >= 2 || card.classList.contains('flipped') || card.classList.contains('matched')) return;
    
    Sound.pop(); // Bubble pop sound
    card.classList.add('flipped');
    flipped.push({card, s});
    
    if(flipped.length === 2) {
        moves++; updateStats();
        if(flipped[0].s === flipped[1].s) {
            Sound.match(); // Match found sound
            setTimeout(() => {
                flipped.forEach(f => f.card.classList.add('matched'));
                matches += 2; flipped = [];
                if(matches === document.querySelectorAll('.bubble-card').length) win();
            }, 600);
        } else {
            setTimeout(() => {
                flipped.forEach(f => f.card.classList.remove('flipped'));
                flipped = [];
            }, 1000);
        }
    }
}

function updateStats() {
    document.getElementById('txt-score').textContent = matches * 10;
    document.getElementById('txt-moves').textContent = moves;
}

function win() {
    clearInterval(timer);
    Sound.win(); // Victory fanfare
    const finalScore = (matches * 10) + Math.floor(timeLeft * 5);
    document.getElementById('win-score').textContent = finalScore;
    saveScore(finalScore);
    setTimeout(() => { nav('scr-win'); createConfetti(); }, 600);
}

function saveScore(s) {
    const scores = JSON.parse(localStorage.getItem('kidScores3DFinal') || '[]');
    scores.push({date: new Date().toLocaleDateString('ar-SA'), score: s});
    scores.sort((a,b) => b.score - a.score);
    localStorage.setItem('kidScores3DFinal', JSON.stringify(scores.slice(0, 5)));
}

function renderScores() {
    const scores = JSON.parse(localStorage.getItem('kidScores3DFinal') || '[]');
    document.getElementById('scores-list').innerHTML = scores.map(s => `<div style="padding:10px; border-bottom:1px solid #EEE;">🌟 ${s.score} نجمة - ${s.date}</div>`).join('') || 'لا يوجد أبطال بعد!';
}

function nextLevel() { Sound.click(); startGame(currentLevel + 1); }
function retry() { Sound.click(); startGame(currentLevel); }

function createConfetti() {
    for(let i=0; i<60; i++) {
        const c = document.createElement('div');
        c.className = 'confetti';
        c.style.background = ['#FF85B3', '#70D6FF', '#FFD670', '#99FFAC', '#B185FF'][Math.floor(Math.random()*5)];
        c.style.left = Math.random() * 100 + 'vw';
        c.style.top = '-20px';
        document.body.appendChild(c);
        c.animate([
            { transform: `translate(0, 0) rotate(0deg)`, opacity: 1 },
            { transform: `translate(${(Math.random()-0.5)*300}px, 100vh) rotate(1080deg)`, opacity: 0 }
        ], { duration: 3000 + Math.random()*2000 }).onfinish = () => c.remove();
    }
}

initBG();
</script>

</body>
</html>
