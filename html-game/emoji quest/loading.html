<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading... Emoji Memory Quest</title>
    <style>
        :root {
            --bg-color: #0b1020;
            --accent-color: #3498db;
            --text-color: #ffffff;
        }

        body {
            margin: 0;
            background-color: var(--bg-color);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        .loader-container {
            text-align: center;
            width: 80%;
            max-width: 400px;
        }

        /* Pulsing Brain Emoji Animation */
        .emoji-loader {
            font-size: 80px;
            margin-bottom: 20px;
            animation: pulse 1.5s ease-in-out infinite;
            display: inline-block;
        }

        @keyframes pulse {
            0% { transform: scale(1); filter: drop-shadow(0 0 0px var(--accent-color)); }
            50% { transform: scale(1.2); filter: drop-shadow(0 0 15px var(--accent-color)); }
            100% { transform: scale(1); filter: drop-shadow(0 0 0px var(--accent-color)); }
        }

        .loading-text {
            font-size: 1.2rem;
            letter-spacing: 2px;
            margin-bottom: 20px;
            font-weight: 300;
            text-transform: uppercase;
        }

        /* Modern Progress Bar */
        .progress-container {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            overflow: hidden;
            position: relative;
        }

        .progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #3498db, #9b59b6);
            border-radius: 10px;
            animation: loadProgress 3s ease-in-out forwards;
        }

        @keyframes loadProgress {
            0% { width: 0%; }
            100% { width: 100%; }
        }

        .hint-text {
            margin-top: 15px;
            font-size: 0.9rem;
            opacity: 0.6;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="loader-container">
        <div class="emoji-loader">🧠</div>
        <div class="loading-text">Preparing Quest...</div>
        
        <div class="progress-container">
            <div class="progress-bar"></div>
        </div>

        <p class="hint-text">Tip: Match pairs quickly to trigger a COMBO! 🔥</p>
    </div>

    <script>
        // Redirect to game after progress finishes (3 seconds)
        setTimeout(() => {
            window.location.href = "index.html";
        }, 3000);
    </script>
</body>
</html>
