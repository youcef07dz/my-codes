<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NOVA STRIKE — Arcade Shooter</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        *{user-select:none;-webkit-tap-highlight-color:transparent;box-sizing:border-box}
        body{margin:0;min-height:100vh;background:#030308;overflow:hidden;font-family:'Orbitron','Courier New',monospace;touch-action:none}
        canvas{display:block;position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:auto}
        #hud{position:fixed;top:0;left:0;right:0;padding:10px 14px;display:flex;justify-content:space-between;font-weight:700;text-shadow:0 0 6px #000;pointer-events:none;z-index:20;font-size:12px;background:linear-gradient(180deg,rgba(0,0,0,.6) 0%,rgba(0,0,0,0) 100%)}
        #hud.off{display:none}
        .hud-left,.hud-right{display:flex;gap:12px;flex-wrap:wrap;row-gap:4px}
        .stat{background:rgba(0,0,0,.55);padding:3px 10px;border-radius:60px;border-left:3px solid #00ff6a}
        .stat span:first-child{color:#aaa;letter-spacing:1px;margin-right:6px;font-size:10px}
        .stat span:last-child{color:#fff;font-weight:700}
        #dLives{font-size:14px;letter-spacing:2px;color:#ff4466}
        #dWep{text-transform:uppercase}
        #dCombo{color:#ffaa44;animation:pulse .4s infinite alternate}
        @keyframes pulse{0%{opacity:.6}100%{opacity:1;text-shadow:0 0 8px gold}}
        .weapon-modules{position:fixed;bottom:16px;left:16px;display:flex;gap:6px;background:rgba(0,0,0,.7);padding:6px 10px;border-radius:10px;pointer-events:none;z-index:20}
        .module-slot{width:36px;height:36px;border:2px solid #444;border-radius:6px;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;font-size:18px}
        .module-slot.filled{border-color:#00ff6a;box-shadow:0 0 8px #00ff6a}
        .overlay{position:fixed;inset:0;background:radial-gradient(circle at center,#03030fcc,#010105ee);backdrop-filter:blur(8px);display:flex;justify-content:center;align-items:center;z-index:100;opacity:0;visibility:hidden;transition:all .25s ease;font-family:'Orbitron',monospace}
        .overlay.on{opacity:1;visibility:visible}
        .menu-panel{background:rgba(8,8,24,.9);width:88%;max-width:900px;max-height:88vh;border:1px solid rgba(0,255,106,.5);border-radius:28px;padding:24px 18px 28px;box-shadow:0 20px 40px rgba(0,0,0,.6),0 0 20px rgba(0,255,106,.2);text-align:center;overflow-y:auto}
        .menu-panel h1{font-size:2.6rem;margin:0;background:linear-gradient(135deg,#fff,#00ff6a);-webkit-background-clip:text;background-clip:text;color:transparent;letter-spacing:3px}
        .menu-panel h2{margin:0 0 10px}
        .ship-row{display:flex;flex-wrap:wrap;justify-content:center;gap:14px;margin:20px 0}
        .ship-card{background:#0a0a1a;border-radius:20px;padding:12px 10px;width:140px;cursor:pointer;border:2px solid #2a2a4a;transition:all .2s;text-align:center}
        .ship-card.sel{border-color:var(--sc,#00ff6a);background:#0c1422;box-shadow:0 0 15px var(--sc,#0f0)}
        .ship-card canvas{background:rgba(0,0,0,.3);border-radius:14px;margin-bottom:6px;width:80px;height:50px;display:block;margin-left:auto;margin-right:auto}
        .sn{font-weight:700;font-size:1.1rem;color:var(--sc,white);margin:4px 0}
        .sd{font-size:.6rem;color:#ccc;white-space:pre-line;line-height:1.3}
        button{background:linear-gradient(135deg,#00cc55,#009933);border:none;padding:10px 28px;font-size:1.1rem;font-weight:700;font-family:inherit;border-radius:60px;color:white;text-shadow:0 1px 2px black;margin:6px;cursor:pointer;transition:transform .1s,filter .2s}
        button:active{transform:scale(.97)}
        button.secondary{background:linear-gradient(135deg,#334,#223);border:1px solid #556}
        button.danger{background:linear-gradient(135deg,#cc3333,#992222)}
        button.warning{background:linear-gradient(135deg,#cc8800,#996600)}
        .score-big{font-size:2rem;color:#ffcc44;margin:12px 0}
        #wave-ann{position:fixed;top:35%;left:50%;transform:translate(-50%,-50%);font-size:2.4rem;font-weight:700;text-align:center;white-space:nowrap;background:rgba(0,0,0,.5);padding:10px 28px;border-radius:60px;backdrop-filter:blur(8px);z-index:200;pointer-events:none;opacity:0;transition:opacity .2s;color:#0f0;text-shadow:0 0 8px #0f0;letter-spacing:2px}
        #wave-ann.show{opacity:1;animation:wavePop 1.2s ease-out forwards}
        #wave-ann.boss{color:#ff4400;text-shadow:0 0 15px red;font-size:2.8rem}
        @keyframes wavePop{0%{opacity:0;transform:translate(-50%,-50%) scale(.8)}20%{opacity:1;transform:translate(-50%,-50%) scale(1.1)}80%{opacity:1;transform:translate(-50%,-50%) scale(1)}100%{opacity:0;transform:translate(-50%,-50%) scale(1)}}
        .settings-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;text-align:left;margin:14px 0;max-width:500px;margin-left:auto;margin-right:auto}
        .setting-item{background:rgba(0,0,0,.4);border-radius:12px;padding:10px 12px;border:1px solid #222}
        .setting-label{font-size:.65rem;color:#aaa;margin-bottom:6px;letter-spacing:1px}
        .setting-value{display:flex;align-items:center;gap:8px}
        .setting-value input[type=range]{flex:1;accent-color:#00ff6a;height:6px}
        .setting-value select{background:#111;color:#fff;border:1px solid #444;border-radius:6px;padding:4px 8px;font-family:inherit;font-size:.75rem}
        .diff-buttons{display:flex;gap:4px}
        .diff-btn{padding:4px 10px;border-radius:6px;border:1px solid #444;background:#111;color:#aaa;font-family:inherit;font-size:.65rem;cursor:pointer;transition:all .2s}
        .diff-btn.active{color:#fff;border-color:currentColor;box-shadow:0 0 6px currentColor}
        .track-list{display:flex;flex-direction:column;gap:4px;max-height:160px;overflow-y:auto}
        .track-item{display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:8px;background:rgba(0,0,0,.3);cursor:pointer;transition:all .15s;border:1px solid transparent}
        .track-item:hover{background:rgba(0,255,106,.08)}
        .track-item.active{border-color:#00ff6a;background:rgba(0,255,106,.1)}
        .track-item .track-icon{font-size:1rem}
        .track-item .track-name{font-size:.7rem;color:#ccc;flex:1}
        .track-item .track-bpm{font-size:.6rem;color:#888}
        .track-item.active .track-name{color:#00ff6a}
        .vol-display{font-size:.7rem;color:#00ff6a;min-width:30px;text-align:right}
        .pause-btn{position:fixed;top:10px;right:10px;z-index:25;background:rgba(0,0,0,.5);border:1px solid #444;border-radius:8px;color:#aaa;font-size:1.2rem;padding:6px 10px;cursor:pointer;font-family:inherit;transition:all .2s}
        .pause-btn:hover{color:#fff;border-color:#00ff6a}
        @media(max-width:700px){.ship-card{width:120px}.menu-panel h1{font-size:1.8rem}.settings-grid{grid-template-columns:1fr}#wave-ann{font-size:1.5rem}#wave-ann.boss{font-size:1.8rem}.menu-panel{padding:16px 12px 20px}}
    </style>
</head>
<body>
<canvas id="c"></canvas>

<div id="hud">
    <div class="hud-left">
        <div class="stat"><span>SCORE</span><span id="dScore">0</span></div>
        <div class="stat"><span>LIVES</span><span id="dLives"></span></div>
        <div class="stat"><span>WEP</span><span id="dWep">1</span></div>
        <div class="stat" id="dCombo"></div>
    </div>
    <div class="hud-right">
        <div class="stat"><span>BOMB</span><span id="dBombs"></span></div>
        <div class="stat"><span>SP</span><span id="dSp">READY</span></div>
        <div class="stat" id="dDiff"><span>DIFF</span><span id="diffText">NORMAL</span></div>
    </div>
</div>

<div class="weapon-modules" id="weaponModules" style="display:none">
    <div class="module-slot" id="slot1">?</div>
    <div class="module-slot" id="slot2">?</div>
    <div class="module-slot" id="slot3">?</div>
</div>

<button class="pause-btn" id="pauseBtn" style="display:none">II</button>

<!-- Main Menu -->
<div id="menu" class="overlay on">
    <div class="menu-panel">
        <h1>NOVA STRIKE</h1>
        <div class="ship-row" id="shipRow"></div>
        <div id="mHi" style="margin:6px;color:#ffaa66;font-size:.9rem">BEST: 0</div>
        <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
            <button id="btnStart">ENGAGE</button>
            <button id="btnSettings" class="secondary">SETTINGS</button>
        </div>
        <div style="margin-top:12px;font-size:.6rem;color:#666">Arrow Keys / WASD &bull; Space = Special &bull; B = Bomb &bull; Esc = Pause</div>
    </div>
</div>

<!-- Settings -->
<div id="settings" class="overlay">
    <div class="menu-panel">
        <h2 style="color:#00ff6a;font-size:1.5rem;margin-top:0">SETTINGS</h2>
        <div class="settings-grid">
            <div class="setting-item">
                <div class="setting-label">DIFFICULTY</div>
                <div class="diff-buttons" id="diffButtons"></div>
            </div>
            <div class="setting-item">
                <div class="setting-label">MUSIC VOLUME</div>
                <div class="setting-value">
                    <input type="range" id="musicVol" min="0" max="100" value="50">
                    <span class="vol-display" id="musicVolVal">50</span>
                </div>
            </div>
            <div class="setting-item">
                <div class="setting-label">SFX VOLUME</div>
                <div class="setting-value">
                    <input type="range" id="sfxVol" min="0" max="100" value="60">
                    <span class="vol-display" id="sfxVolVal">60</span>
                </div>
            </div>
            <div class="setting-item" style="grid-column:1/-1">
                <div class="setting-label">MUSIC TRACK</div>
                <div class="track-list" id="trackList"></div>
            </div>
        </div>
        <button id="btnSettingsClose" class="secondary">BACK</button>
    </div>
</div>

<!-- Pause -->
<div id="pause" class="overlay">
    <div class="menu-panel">
        <h2 style="color:#ffaa00;font-size:1.8rem;margin-top:0">PAUSED</h2>
        <div style="display:flex;flex-direction:column;gap:8px;align-items:center;margin:16px 0">
            <button id="btnResume" style="min-width:200px">RESUME</button>
            <button id="btnPauseSettings" class="secondary" style="min-width:200px">SETTINGS</button>
            <button id="btnQuit" class="danger" style="min-width:200px">QUIT TO MENU</button>
        </div>
        <div style="font-size:.55rem;color:#555;margin-top:8px">Press ESC to resume</div>
    </div>
</div>

<!-- Game Over -->
<div id="gameover" class="overlay">
    <div class="menu-panel">
        <h2 style="color:#ff4466;">DESTROYED</h2>
        <div class="score-big" id="dFinal">0</div>
        <div id="dGoShip" style="color:#0f0;font-size:.8rem"></div>
        <div id="dWave" style="color:#aaa;font-size:.7rem;margin:4px 0"></div>
        <div id="dBest" style="margin:8px;color:#ffaa66;font-size:.8rem"></div>
        <div style="display:flex;gap:14px;justify-content:center">
            <button id="btnRetry">RESTART</button>
            <button id="btnMenu" class="secondary">MENU</button>
        </div>
    </div>
</div>

<div id="wave-ann"></div>

<script>

   - Dynamic Audio Compressor (no more audio clipping)
   - Magnetic Power-ups (pull towards player)

   - CRT Vignette & Glow Effects
   - Shockwave particles for bombs/explosions
   - Smoother movement with momentum
   ================================================================ */

const cx = cv.getContext('2d');
let W, H, dpr;

let state = 'MENU';

let combo, comboT, wave, waveT, waveDelay, waveAnnT;

let enIdCtr = 0;

let currentBgTheme = 0;

    { name:'Asteroid Belt',  bg:'#0f0a05', starCols:['#ffddaa','#ffcc88','#ccaa66'], nebula:['rgba(100,60,20,0.06)','rgba(80,40,10,0.04)'] },

    { name:'The Void',      bg:'#010103', starCols:['#ffffff','#8888aa','#555577'], nebula:[] }
];

const SHIPS = {
    viper:   { name:'VIPER',   color:'#00ff6a', accent:'#aaffcc', trail:'#00ff6a', speed:5.5, hp:3, fireRate:7,  bulletSpd:12, bulletDmg:1, w:34, h:26, spName:'DASH',    spCD:140, spDur:14, desc:'SPEED:5 FIRE:4 ARMOR:2' },

};

const P = {
    x:0, y:0, vx:0, vy:0, spd:5, lives:3, wepLvl:1, shield:false, shT:0,
    inv:false, invT:0, ft:0, alive:true,

/* ================================================================
   MUSIC ENGINE — Procedural Arcade Music + Dynamic Compressor
   ================================================================ */
const MusicTracks = [
    { name:'Neon Drive', bpm:130, icon:'🎹', scale:[261.63,311.13,349.23,392.00,466.16], bass:[1,0,1,0,1,0,1,0,3,0,3,0,3,0,3,0,4,0,4,0,4,0,4,0,2,0,2,0,2,0,2,0], lead:[0,0,0,0,5,0,0,3,0,0,4,0,0,0,5,0,0,0,0,0,5,0,0,3,0,0,4,0,0,0,0,0], arp:[1,3,4,5,1,3,4,5,3,4,5,1,3,4,5,1,4,5,1,3,4,5,1,3,2,3,4,5,2,3,4,5], bassOct:2, leadOct:5, arpOct:5 },

class MusicEngine {
    constructor() {
        this.ctx = null; this.masterGain = null; this.musicGain = null; this.sfxGain = null; this.compressor = null;
        this.isPlaying = false; this.currentTrack = 0; this.currentStep = 0; this.nextStepTime = 0;
        this.lookahead = 25; this.scheduleAheadTime = 0.1; this.timerID = null; this.musicVolume = 0.5; this.sfxVolume = 0.6;
    }
    init() {
        if (this.ctx) return;

        this.compressor = this.ctx.createDynamicsCompressor();
        this.compressor.threshold.setValueAtTime(-50, this.ctx.currentTime);
        this.compressor.knee.setValueAtTime(40, this.ctx.currentTime);
        this.compressor.ratio.setValueAtTime(12, this.ctx.currentTime);
        this.compressor.attack.setValueAtTime(0, this.ctx.currentTime);
        this.compressor.release.setValueAtTime(0.25, this.ctx.currentTime);
        this.masterGain.connect(this.compressor); this.compressor.connect(this.ctx.destination);
        this.musicGain = this.ctx.createGain(); this.musicGain.gain.value = this.musicVolume; this.musicGain.connect(this.masterGain);
        this.sfxGain = this.ctx.createGain(); this.sfxGain.gain.value = this.sfxVolume; this.sfxGain.connect(this.masterGain);
    }
    setMusicVolume(v) { this.musicVolume = v; if (this.musicGain) this.musicGain.gain.value = v; }
    setSfxVolume(v) { this.sfxVolume = v; if (this.sfxGain) this.sfxGain.gain.value = v; }
    play() { this.init(); if (this.ctx.state === 'suspended') this.ctx.resume(); if (this.isPlaying) return; this.isPlaying = true; this.currentStep = 0; this.nextStepTime = this.ctx.currentTime + 0.05; this._schedule(); }
    stop() { this.isPlaying = false; if (this.timerID) { clearTimeout(this.timerID); this.timerID = null; } }
    changeTrack(idx) { this.currentTrack = idx; this.currentStep = 0; if (!this.isPlaying && state === 'PLAY') this.play(); }
    _schedule() { if (!this.isPlaying) return; while (this.nextStepTime < this.ctx.currentTime + this.scheduleAheadTime) { this._playStep(this.currentStep, this.nextStepTime); const t = MusicTracks[this.currentTrack]; this.nextStepTime += (60 / t.bpm) / 4; this.currentStep = (this.currentStep + 1) % 32; } this.timerID = setTimeout(() => this._schedule(), this.lookahead); }
    _playStep(step, time) { const t = MusicTracks[this.currentTrack]; if (t.bass[step]) this._note(t.bass[step], time, 'square', 0.12, t.bassOct, t, 0.12); if (t.lead[step]) this._note(t.lead[step], time, 'square', 0.06, t.leadOct, t, 0.08); if (t.arp[step]) this._note(t.arp[step], time, 'triangle', 0.04, t.arpOct, t, 0.06); if (t.drums[step]) this._drum(t.drums[step], time); }
    _note(deg, time, type, vol, oct, track, dur) { const freq = track.scale[(deg - 1) % track.scale.length] * Math.pow(2, oct - 4); const osc = this.ctx.createOscillator(); const g = this.ctx.createGain(); osc.type = type; osc.frequency.setValueAtTime(freq, time); g.gain.setValueAtTime(vol * this.musicVolume, time); g.gain.exponentialRampToValueAtTime(0.001, time + dur); osc.connect(g); g.connect(this.musicGain); osc.start(time); osc.stop(time + dur + 0.01); }
    _drum(type, time) { const vol = this.musicVolume; if (type === 1) { const o = this.ctx.createOscillator(); const g = this.ctx.createGain(); o.frequency.setValueAtTime(150, time); o.frequency.exponentialRampToValueAtTime(30, time + 0.1); g.gain.setValueAtTime(0.25 * vol, time); g.gain.exponentialRampToValueAtTime(0.001, time + 0.2); o.connect(g); g.connect(this.musicGain); o.start(time); o.stop(time + 0.22); } else if (type === 2) { const len = 0.1; const buf = this.ctx.createBuffer(1, this.ctx.sampleRate * len, this.ctx.sampleRate); const d = buf.getChannelData(0); for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1; const n = this.ctx.createBufferSource(); n.buffer = buf; const g = this.ctx.createGain(); g.gain.setValueAtTime(0.12 * vol, time); g.gain.exponentialRampToValueAtTime(0.001, time + len); const f = this.ctx.createBiquadFilter(); f.type = 'highpass'; f.frequency.value = 1000; n.connect(f); f.connect(g); g.connect(this.musicGain); n.start(time); n.stop(time + len + 0.01); } else if (type === 3) { const len = 0.04; const buf = this.ctx.createBuffer(1, this.ctx.sampleRate * len, this.ctx.sampleRate); const d = buf.getChannelData(0); for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1; const n = this.ctx.createBufferSource(); n.buffer = buf; const g = this.ctx.createGain(); g.gain.setValueAtTime(0.04 * vol, time); g.gain.exponentialRampToValueAtTime(0.001, time + len); const f = this.ctx.createBiquadFilter(); f.type = 'highpass'; f.frequency.value = 6000; n.connect(f); f.connect(g); g.connect(this.musicGain); n.start(time); n.stop(time + len + 0.01); } }

}

        if(keys['ArrowUp']||keys['w'])my=-1; if(keys['ArrowDown']||keys['s'])my=1;

    for(const mid of P.modules){ if(mid==='rapid')rate=Math.max(3,rate-3); if(mid==='heavy')rate=Math.min(20,rate+2); if(mid==='plasma')rate=Math.min(20,rate+4); if(mid==='chain')rate=Math.min(18,rate+1); if(mid==='mine')rate=Math.min(16,rate+3); }

    if(P.inv){P.invT--;if(P.invT<=0)P.inv=false}

        const b=pBul[i]; if(b.mine){b.vy+=0.02;if(b.vx<0)b.vx+=0.05;if(b.vx>=0)b.vx=0} b.x+=b.vx;b.y+=b.vy;
        if(b.homing&&ens.length>0){ let nearest=null,nd=Infinity; for(const e of ens){const d2=dist(b,e);if(d2<nd){nd=d2;nearest=e}} if(nearest&&nd<300){ const dx=nearest.x-b.x,dy=nearest.y-b.y; const a=Math.atan2(dy,dx); const ca=Math.atan2(b.vy,b.vx); let diff2=a-ca;while(diff2>Math.PI)diff2-=6.28;while(diff2<-Math.PI)diff2+=6.28; const na=ca+Math.sign(diff2)*Math.min(Math.abs(diff2),b.homing); const spd=Math.sqrt(b.vx*b.vx+b.vy*b.vy); b.vx=Math.cos(na)*spd;b.vy=Math.sin(na)*spd; } }

    for(let i=pups.length-1;i>=0;i--){
        const p=pups[i]; if(Math.abs(p.x-P.x)<(p.w+s.w)/2&&Math.abs(p.y-P.y)<(p.h+s.h)/2){ music.sfx('pu');flash=.25;
            switch(p.type){ case'weapon':P.wepLvl=Math.min(5,P.wepLvl+1);addFT(P.x,P.y-20,'WEAPON LVL '+P.wepLvl,'#00ff6a');break; case'shield':P.shield=true;P.shT=500;addFT(P.x,P.y-20,'SHIELD','#00ddff');break; case'health':P.lives=Math.min(SHIPS[selectedShip].hp+2,P.lives+1);addFT(P.x,P.y-20,'HEALTH +1','#ff2244');break; case'bomb':bombs=Math.min(5,bombs+1);addFT(P.x,P.y-20,'BOMB +1','#ff4400');break; case'module':if(p.moduleType&&WEAPON_MODULES[p.moduleType])addModule(p.moduleType);break; }
            pups.splice(i,1); }
    }

    document.getElementById('dScore').textContent=score.toLocaleString();
    document.getElementById('dLives').textContent='❤'.repeat(Math.max(0,P.lives));
    document.getElementById('dBombs').textContent='◆'.repeat(bombs);
    document.getElementById('dWep').textContent='LVL '+P.wepLvl;
    document.getElementById('dCombo').textContent=combo>1?combo+'x COMBO':'';
    document.getElementById('dSp').textContent=P.spCD>0?s.spName+'...':s.spName;
    document.getElementById('dSp').style.color=P.spCD>0?'rgba(255,255,255,.3)':s.color;
    document.getElementById('diffText').textContent=diff.name;
    document.getElementById('dDiff').style.borderLeftColor=diff.color;
    document.getElementById('diffText').style.color=diff.color;
}

function drawShipShape(c,type){ switch(type){ case'viper': c.fillStyle='#00ff6a';c.beginPath();c.moveTo(18,0);c.lineTo(-8,-13);c.lineTo(-3,-4);c.lineTo(-13,-3);c.lineTo(-13,3);c.lineTo(-3,4);c.lineTo(-8,13);c.closePath();c.fill(); c.fillStyle='#aaffcc';c.beginPath();c.moveTo(14,0);c.lineTo(2,-4);c.lineTo(2,4);c.closePath();c.fill(); c.fillStyle='#00ddff';c.beginPath();c.ellipse(-14,0,4,2.5,0,0,6.28);c.fill(); break; case'titan': c.fillStyle='#ff8800';c.beginPath();c.moveTo(20,0);c.lineTo(10,-16);c.lineTo(-14,-14);c.lineTo(-20,-6);c.lineTo(-20,6);c.lineTo(-14,14);c.lineTo(10,16);c.closePath();c.fill(); c.fillStyle='#cc6600';c.fillRect(-16,-8,28,16); c.fillStyle='#ffcc66';c.beginPath();c.moveTo(16,0);c.lineTo(4,-5);c.lineTo(4,5);c.closePath();c.fill(); c.fillStyle='#ff4400';c.beginPath();c.arc(-8,0,5,0,6.28);c.fill(); c.fillStyle='#ffaa00';c.fillRect(-20,-10,5,4);c.fillRect(-20,6,5,4); break; case'phantom': c.fillStyle='#00ddff';c.beginPath();c.moveTo(16,0);c.lineTo(4,-12);c.lineTo(-12,-8);c.lineTo(-16,0);c.lineTo(-12,8);c.lineTo(4,12);c.closePath();c.fill(); c.fillStyle='#88eeff';c.beginPath();c.moveTo(12,0);c.lineTo(0,-5);c.lineTo(-6,0);c.lineTo(0,5);c.closePath();c.fill(); c.fillStyle='#0088aa';c.beginPath();c.arc(-4,0,3.5,0,6.28);c.fill(); c.fillStyle='rgba(0,221,255,.3)';c.beginPath();c.ellipse(-16,0,6,3,0,0,6.28);c.fill(); break; case'raven': c.fillStyle='#cc44ff';c.beginPath();c.moveTo(18,0);c.lineTo(6,-14);c.lineTo(-6,-10);c.lineTo(-16,-16);c.lineTo(-12,-4);c.lineTo(-16,0);c.lineTo(-12,4);c.lineTo(-16,16);c.lineTo(-6,10);c.lineTo(6,14);c.closePath();c.fill(); c.fillStyle='#ee88ff';c.beginPath();c.moveTo(14,0);c.lineTo(2,-5);c.lineTo(-4,0);c.lineTo(2,5);c.closePath();c.fill(); c.fillStyle='#9922cc';c.beginPath();c.arc(-2,0,3,0,6.28);c.fill(); break; } }
function drawEnemyShape(c,e){ switch(e.type){ case'scout': c.fillStyle='#ff4400';c.beginPath();c.moveTo(-9,0);c.lineTo(5,-7);c.lineTo(9,0);c.lineTo(5,7);c.closePath();c.fill(); c.fillStyle='#ffcc00';c.beginPath();c.moveTo(4,0);c.lineTo(-3,-3);c.lineTo(-3,3);c.closePath();c.fill(); break; case'fighter': c.fillStyle='#ff2266';c.beginPath();c.moveTo(-12,0);c.lineTo(4,-11);c.lineTo(12,-4);c.lineTo(8,0);c.lineTo(12,4);c.lineTo(4,11);c.closePath();c.fill(); c.fillStyle='#ff6688';c.beginPath();c.moveTo(5,0);c.lineTo(-4,-4);c.lineTo(-4,4);c.closePath();c.fill(); break; case'drone': c.fillStyle='#44ff88';c.beginPath();c.ellipse(0,0,8,6,0,0,6.28);c.fill(); c.fillStyle='#00cc44';c.beginPath();c.arc(-3,0,2,0,6.28);c.fill(); break; case'carrier': c.fillStyle='#8844ff';c.fillRect(-20,-12,40,24);c.fillStyle='#aa66ff';c.fillRect(-15,-8,30,16); break; case'guardian': c.fillStyle='#ff8844';c.beginPath();c.ellipse(0,0,22,18,0,0,6.28);c.fill(); c.fillStyle='#ffaa66';c.beginPath();c.ellipse(0,0,16,12,0,0,6.28);c.fill(); break; case'shieldBearer': c.fillStyle='#00cccc';c.beginPath();c.moveTo(-10,0);c.lineTo(4,-9);c.lineTo(10,0);c.lineTo(4,9);c.closePath();c.fill(); if(e.hasShield&&e.shieldHp>0){c.strokeStyle='rgba(0,255,255,.6)';c.lineWidth=3;c.beginPath();c.arc(8,0,10,-1.2,1.2);c.stroke()} break; case'teleporter': c.fillStyle='#ff44ff';c.beginPath();c.arc(0,0,8,0,6.28);c.fill(); c.fillStyle='#ffaaff';c.beginPath();c.arc(0,0,4,0,6.28);c.fill(); break; case'splitter': c.fillStyle='#88ff00';c.beginPath();c.moveTo(-8,-8);c.lineTo(8,-4);c.lineTo(8,4);c.lineTo(-8,8);c.closePath();c.fill(); c.fillStyle='#ccff44';c.fillRect(-4,-3,8,6); break; case'healer': c.fillStyle='#00ffcc';c.beginPath();c.arc(0,0,9,0,6.28);c.fill(); c.fillStyle='#88ffee';c.beginPath();c.moveTo(0,-5);c.lineTo(3,0);c.lineTo(0,5);c.lineTo(-3,0);c.closePath();c.fill(); break; case'charger': c.fillStyle='#ffcc00';c.beginPath();c.moveTo(-10,-6);c.lineTo(10,0);c.lineTo(-10,6);c.closePath();c.fill(); c.fillStyle='#ffee44';c.beginPath();c.moveTo(-6,-3);c.lineTo(4,0);c.lineTo(-6,3);c.closePath();c.fill(); break; case'turret': c.fillStyle='#888';c.fillRect(-10,-10,20,20);c.fillStyle='#aaa';c.fillRect(-6,-6,12,12); c.fillStyle='#ff6644';c.fillRect(-14,-2,8,4); break; case'cruiser': c.fillStyle='#881122';c.beginPath();c.moveTo(-14,0);c.lineTo(0,-10);c.lineTo(14,0);c.lineTo(0,10);c.closePath();c.fill(); c.fillStyle='#aa2244';c.beginPath();c.moveTo(-8,0);c.lineTo(0,-5);c.lineTo(0,5);c.closePath();c.fill(); break; case'sniper': c.fillStyle='#ff44aa';c.beginPath();c.moveTo(-8,0);c.lineTo(2,-6);c.lineTo(10,0);c.lineTo(2,6);c.closePath();c.fill(); c.fillStyle='#ff88cc';c.fillRect(-12,-1,8,2); break; case'swarm': c.fillStyle='#44aaff';c.beginPath();c.arc(0,0,5,0,6.28);c.fill(); c.fillStyle='#88ccff';c.beginPath();c.arc(-2,0,2,0,6.28);c.fill(); break; case'bomber': c.fillStyle='#ffaa00';c.beginPath();c.ellipse(0,0,13,10,0,0,6.28);c.fill(); c.fillStyle='#ffcc44';c.beginPath();c.ellipse(0,0,8,6,0,0,6.28);c.fill(); break; case'interceptor': c.fillStyle='#ff6633';c.beginPath();c.moveTo(-8,0);c.lineTo(4,-6);c.lineTo(10,0);c.lineTo(4,6);c.closePath();c.fill(); c.fillStyle='#ffaa66';c.beginPath();c.moveTo(2,0);c.lineTo(-3,-2);c.lineTo(-3,2);c.closePath();c.fill(); break; default: c.fillStyle='#ff6633';c.beginPath();c.moveTo(-10,0);c.lineTo(2,-6);c.lineTo(10,0);c.lineTo(2,6);c.closePath();c.fill(); } }

function render(){
    cx.save(); if(shake>0)cx.translate((Math.random()-.5)*shake,(Math.random()-.5)*shake); const theme=BG_THEMES[currentBgTheme];
    cx.fillStyle=theme.bg; cx.fillRect(-10,-10,W+20,H+20);
    for(const bp of bgParticles){ cx.fillStyle=bp.col; cx.beginPath();cx.arc(bp.x,bp.y,bp.r,0,6.28);cx.fill(); }
    if(currentBgTheme===3){ cx.strokeStyle='rgba(0,255,136,.06)';cx.lineWidth=1; const gs=60,ox=(fc*.3)%gs; for(let x=-gs+ox;x<W+gs;x+=gs){cx.beginPath();cx.moveTo(x,0);cx.lineTo(x,H);cx.stroke()} for(let y=0;y<H;y+=gs){cx.beginPath();cx.moveTo(0,y);cx.lineTo(W,y);cx.stroke()} }
    if(stars.length){ for(const s of stars){cx.globalAlpha=s.a;cx.fillStyle=s.col;cx.fillRect(s.x,s.y,s.sz,s.sz)} } cx.globalAlpha=1;
    
    for(const p of parts){ 
        cx.globalAlpha=clamp(p.life,0,1);cx.fillStyle=p.col; 
        if(p.ring) { cx.strokeStyle=p.col; cx.lineWidth=2; cx.beginPath(); cx.arc(p.x,p.y,p.rr,0,6.28); cx.stroke(); }
        else { cx.beginPath();cx.arc(p.x,p.y,Math.max(.5,p.sz*p.life),0,6.28);cx.fill(); }
    } cx.globalAlpha=1;
    
    for(const b of eBul){ 
        if(b.laser){ cx.shadowBlur=8; cx.shadowColor='#ff44aa'; cx.fillStyle='#ff44aa';cx.fillRect(b.x-4,b.y-1,8,2); cx.fillStyle='#ff88cc';cx.fillRect(b.x-2,b.y-2,6,4); } 
        else if(b.homing){ cx.shadowBlur=8; cx.shadowColor='#ff8844'; cx.fillStyle='#ff8844';cx.beginPath();cx.arc(b.x,b.y,b.r,0,6.28);cx.fill(); cx.fillStyle='#ffcc88';cx.beginPath();cx.arc(b.x,b.y,b.r*.5,0,6.28);cx.fill(); } 
        else { cx.shadowBlur=6; cx.shadowColor='#ff3355'; cx.fillStyle='#ff3355';cx.beginPath();cx.arc(b.x,b.y,b.r,0,6.28);cx.fill(); } 
        cx.shadowBlur=0;
    }
    for(const e of ens){ cx.save();cx.translate(e.x,e.y); if(e.stunT>0)cx.globalAlpha=.5+Math.sin(fc*.3)*.2; drawEnemyShape(cx,e); if(e.hp<e.mhp){ cx.fillStyle='#ff2244';cx.fillRect(-e.w/2,-e.h/2-7,e.w*(e.hp/e.mhp),3); cx.strokeStyle='#880011';cx.strokeRect(-e.w/2,-e.h/2-7,e.w,3); } if(e.hasShield&&e.shieldHp>0){ cx.fillStyle='#00cccc';cx.fillRect(-e.w/2,-e.h/2-11,e.w*(e.shieldHp/3),2); } cx.restore(); }
    
    for(const b of pBul){ 
        if(b.mine){ cx.fillStyle=b.col;cx.beginPath();cx.arc(b.x,b.y,4,0,6.28);cx.fill(); cx.fillStyle='#ffaa44';cx.beginPath();cx.arc(b.x,b.y,2,0,6.28);cx.fill(); } 
        else if(b.plasma){ cx.shadowBlur=12; cx.shadowColor=b.col; cx.fillStyle=b.col;cx.beginPath();cx.arc(b.x,b.y,6,0,6.28);cx.fill(); cx.fillStyle='#fff';cx.beginPath();cx.arc(b.x,b.y,3,0,6.28);cx.fill(); cx.shadowBlur=0; } 
        else if(b.pierce>1){ cx.shadowBlur=6; cx.shadowColor=b.col; cx.fillStyle=b.col;cx.fillRect(b.x-b.w/2,b.y-b.h/2,b.w,b.h); cx.fillStyle='#fff';cx.fillRect(b.x-b.w/2+2,b.y-b.h/2+1,b.w-4,b.h-2); cx.shadowBlur=0; } 
        else { cx.shadowBlur=4; cx.shadowColor=b.col; cx.fillStyle=b.col;cx.fillRect(b.x-b.w/2,b.y-b.h/2,b.w,b.h); cx.shadowBlur=0; } 
    }
    
    for(const p of pups){ cx.save();cx.translate(p.x,p.y+Math.sin(p.ph)*3); let col; switch(p.type){case'weapon':col='#00ff6a';break;case'shield':col='#00ddff';break;case'health':col='#ff2244';break;case'bomb':col='#ff4400';break;case'module':col='#ffaa44';break;default:col='#fff'} cx.shadowBlur=10; cx.shadowColor=col; cx.fillStyle=col;cx.beginPath();cx.arc(0,0,8,0,6.28);cx.fill(); cx.shadowBlur=0; cx.fillStyle='rgba(255,255,255,.5)';cx.beginPath();cx.arc(-2,-2,3,0,6.28);cx.fill(); if(p.type==='module'&&p.moduleType){ cx.fillStyle='#fff';cx.font='10px Arial';cx.textAlign='center';cx.textBaseline='middle'; cx.fillText(WEAPON_MODULES[p.moduleType].icon,0,1); } cx.restore(); }
    
    if(P.alive){ cx.save();cx.translate(P.x,P.y); if(P.inv&&~~(P.invT/4)%2===0)cx.globalAlpha=.35; if(P.cloak)cx.globalAlpha=.15+Math.sin(fc*.15)*.05; if(P.shield){ cx.strokeStyle='rgba(0,221,255,.35)';cx.lineWidth=2; cx.beginPath();cx.arc(0,0,24,0,6.28);cx.stroke(); } drawShipShape(cx,selectedShip); if(P.modules.length>0){ cx.font='9px Arial';cx.textAlign='center'; for(let i=0;i<P.modules.length;i++){cx.fillStyle=WEAPON_MODULES[P.modules[i]].color;cx.fillText(WEAPON_MODULES[P.modules[i]].icon,-14+i*12,-16)} } cx.restore(); }
    
    cx.textAlign='center';cx.textBaseline='middle'; for(const f of fTexts){ cx.globalAlpha=clamp(f.life,0,1);cx.fillStyle=f.col; cx.font='bold 11px Orbitron,sans-serif';cx.fillText(f.text,f.x,f.y); } cx.globalAlpha=1;
    if(flash>0){cx.globalAlpha=clamp(flash*.5,0,.5);cx.fillStyle='#fff';cx.fillRect(-10,-10,W+20,H+20)} 
    
    // CRT Vignette
    const gradient = cx.createRadialGradient(W/2, H/2, W*0.3, W/2, H/2, W*0.75);
    gradient.addColorStop(0, 'rgba(0,0,0,0)');
    gradient.addColorStop(1, 'rgba(0,0,0,0.6)');
    cx.fillStyle = gradient;
    cx.fillRect(0, 0, W, H);
    
    cx.restore();
}

function buildMenu(){ const row=document.getElementById('shipRow'); row.innerHTML=''; for(const[key,ship]of Object.entries(SHIPS)){ const card=document.createElement('div'); card.className='ship-card'+(key===selectedShip?' sel':''); card.dataset.ship=key;card.style.setProperty('--sc',ship.color); card.innerHTML=`<canvas width="80" height="50"></canvas><div class="sn">${ship.name}</div><div class="sd">${ship.desc}</div>`; card.addEventListener('click',()=>{selectedShip=key;document.querySelectorAll('.ship-card').forEach(c=>c.classList.remove('sel'));card.classList.add('sel');drawPreviews()}); row.appendChild(card); } document.getElementById('mHi').textContent='BEST: '+hi.toLocaleString(); drawPreviews(); }
function drawPreviews(){ document.querySelectorAll('.ship-card').forEach(card=>{ const type=card.dataset.ship; const cvs=card.querySelector('canvas'); const c=cvs.getContext('2d'); c.clearRect(0,0,80,50);c.save();c.translate(40,25);c.scale(1.2,1.2);drawShipShape(c,type);c.restore(); }); }

function startGame(){ music.init(); document.getElementById('menu').className='overlay'; document.getElementById('gameover').className='overlay'; document.getElementById('hud').className=''; document.getElementById('pauseBtn').style.display='block'; document.getElementById('weaponModules').style.display='flex'; state='PLAY'; reset(); music.play(); }
document.getElementById('btnStart').addEventListener('click',startGame);
document.getElementById('btnRetry').addEventListener('click',startGame);
document.getElementById('btnMenu').addEventListener('click',()=>{ document.getElementById('gameover').className='overlay'; document.getElementById('menu').className='overlay on'; document.getElementById('mHi').textContent='BEST: '+hi.toLocaleString(); document.getElementById('weaponModules').style.display='none'; state='MENU';parts=[];ens=[];eBul=[];pBul=[];pups=[];music.stop(); });

function loop(){ update(); render(); requestAnimationFrame(loop); }
buildMenu(); mkStars(); loop();
</script>
